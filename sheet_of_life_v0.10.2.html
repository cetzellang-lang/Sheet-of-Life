<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheet of Life v0.10.2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,300..700;1,300..700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── Jet black terminal palette ── */
  --bg:#000000;--bg2:#0d0d0d;--bg3:#1a1a1a;--bg4:#262626;
  --text:#f8f8f2;--text2:#cfcfc2;--text3:#6c6c6c;
  --border:rgba(248,248,242,0.1);--border2:rgba(248,248,242,0.25);
  /* cyan = primary accent */
  --blue:#66d9ef;--blue-l:rgba(102,217,239,0.12);--blue-d:#4ec9da;
  /* green */
  --green-bg:rgba(166,226,46,0.12);--green-t:#a6e22e;--green:#a6e22e;
  /* orange */
  --amber-bg:rgba(253,151,31,0.14);--amber-t:#fd971f;
  /* purple */
  --purple-bg:rgba(174,129,255,0.13);--purple-t:#ae81ff;
  /* red/coral */
  --coral-bg:rgba(249,38,114,0.12);--coral-t:#f92672;
  /* pink */
  --pink-bg:rgba(255,110,180,0.12);--pink-t:#ff6eb4;
  /* teal = green in Monokai */
  --teal-bg:rgba(166,226,46,0.12);--teal-t:#a6e22e;
  /* red */
  --red-bg:rgba(249,38,114,0.12);--red-t:#f92672;
  /* neon yellow */
  --yellow:#e6db74;
  --r:2px;--rl:3px;
  /* terminal glow helpers */
  --glow-cyan:0 0 8px rgba(102,217,239,0.35);
  --glow-green:0 0 8px rgba(166,226,46,0.35)
}
body{font-family:'Cascadia Code','Cascadia Mono','Fira Code','JetBrains Mono',monospace;background:var(--bg);color:var(--text);font-size:15px}
.app{display:flex;flex-direction:column;height:100vh}
.nav{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--blue);background:#000000;position:sticky;top:0;z-index:20;flex-wrap:wrap;box-shadow:0 1px 0 0 var(--blue),0 2px 12px rgba(102,217,239,0.08)}
.nav-t{font-size:16px;font-weight:600;margin-right:auto;color:var(--green);letter-spacing:.03em}
.nav-t::before{content:'> ';color:var(--text3);font-weight:400}
.nav-t::after{content:'_';animation:blink 1.1s step-start infinite;color:var(--green)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.nav-ver{font-size:11px;color:var(--text3);font-weight:400;margin-left:4px}
.tb{padding:4px 12px;border:1px solid var(--border2);border-radius:var(--r);background:transparent;color:var(--text3);cursor:pointer;font-size:12px;font-weight:500;transition:all .12s;font-family:inherit;letter-spacing:.02em}
.tb:hover{background:var(--bg3);color:var(--text2);border-color:var(--text3)}.tb.on{background:transparent;color:var(--blue);border-color:var(--blue);box-shadow:var(--glow-cyan)}
.main{display:flex;flex:1;overflow:hidden}
.side{width:230px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg2);overflow-y:auto;padding:10px;transition:width .2s}
.side.collapsed{width:36px;padding:6px;overflow:hidden}
.side.collapsed>*:not(.side-toggle){display:none}
.side-toggle{font-size:14px;cursor:pointer;color:var(--text2);text-align:center;padding:4px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);margin-bottom:6px;font-family:inherit}
.side-toggle:hover{background:var(--bg3)}
.cnt{flex:1;overflow-y:auto;padding:14px 18px}
.cnt.cal-mode{display:flex;flex-direction:column;overflow:hidden}
.cnt.cal-mode>.cal-scroll-top{flex-shrink:0}
.cnt.cal-mode>.cal-wrap{flex:1;min-height:200px}
.lbl{font-size:11px;font-weight:600;color:var(--yellow);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.sinp{width:100%;padding:6px 9px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);font-size:13px;margin-bottom:6px;outline:none;font-family:inherit}
.sinp:focus{border-color:var(--blue);box-shadow:var(--glow-cyan)}
.fbar{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px}
.fb{padding:2px 7px;border:1px solid var(--border2);border-radius:var(--r);font-size:11px;font-weight:500;cursor:pointer;background:transparent;color:var(--text3);font-family:inherit}
.fb:hover{background:var(--bg3);color:var(--text2)}.fb.on{background:var(--purple-bg);border-color:var(--purple-t);color:var(--purple-t)}
.tag{font-size:10px;font-weight:500;padding:1px 6px;border-radius:var(--r)}
.rc{padding:7px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);margin-bottom:4px;cursor:pointer;transition:border-color .12s}
.rc:hover{border-color:var(--text3)}.rc.on{border:1px solid var(--blue);background:var(--blue-l);box-shadow:var(--glow-cyan)}
.rcn{font-size:12px;font-weight:500;line-height:1.4}
.rct{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}

/* Goals */
.goals-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.goal-card{flex:1;min-width:140px;padding:10px 14px;border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:var(--r);background:var(--bg2)}
.goal-label{font-size:11px;font-weight:600;color:var(--yellow);text-transform:uppercase;letter-spacing:.05em}
.goal-val{font-size:22px;font-weight:600;margin-top:3px;color:var(--text)}
.goal-bar{height:3px;background:var(--bg4);border-radius:0;margin-top:8px;overflow:hidden}
.goal-fill{height:100%;border-radius:0;transition:width .3s}

/* Timeframe */
.tf-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-top:2px solid var(--blue);border-radius:var(--r);flex-wrap:wrap}
.tf-label{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap}
.tf-inp{padding:3px 7px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);font-size:12px;outline:none;width:120px;font-family:inherit}
.tf-stats{font-size:12px;color:var(--text2);margin-left:auto}.tf-hl{color:var(--blue);font-weight:600}

/* Calendar */
.cal-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cal-mo{font-size:17px;font-weight:600;flex:1;color:var(--yellow);letter-spacing:.02em}
.arr{padding:3px 10px;border:1px solid var(--border2);border-radius:var(--r);background:transparent;color:var(--text2);cursor:pointer;font-size:14px;font-family:inherit}
.arr:hover{color:var(--blue);border-color:var(--blue)}
.arr:disabled{opacity:.25;cursor:default}
.cal-wrap{display:flex;flex-direction:column;flex:1;min-height:0}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cgrid.flex-fill{grid-template-rows:auto repeat(var(--weeks,6),1fr);flex:1;min-height:0}
.dow{font-size:10px;font-weight:600;color:var(--blue);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:.08em}
.day{min-height:90px;border:1px solid var(--border);border-radius:var(--r);padding:4px;cursor:pointer;background:var(--bg);position:relative;overflow:hidden;display:flex;flex-direction:column;transition:border-color .1s,background .1s}
.day:hover:not(.om){background:var(--bg3);border-color:var(--border2)}
.day.om{opacity:.25;cursor:default;pointer-events:none}
.day.pd{background:var(--bg2)}
.day.pd:hover{background:var(--bg3)}
.day.td{border-color:var(--blue);box-shadow:inset 0 0 0 1px var(--blue),var(--glow-cyan)}.day.hm{background:var(--blue-l)}
.day.in-tf{border-left:2px solid rgba(102,217,239,0.3)}
.dn{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:2px;flex-shrink:0;font-variant-numeric:tabular-nums}.td .dn{color:var(--blue);font-weight:700;text-shadow:0 0 6px rgba(102,217,239,0.6)}
.pd .dn{color:var(--text3);opacity:.6}
.day-content{flex:1;min-height:0;overflow:hidden}
/* Meal slot labels */
.slot-lbl{font-size:7px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.mc{font-size:9px;padding:2px 5px;border-radius:var(--r);margin-bottom:2px;display:flex;align-items:center;gap:2px;line-height:1.3;cursor:pointer;overflow:hidden}
.mc.cook{background:rgba(102,217,239,0.18);color:var(--blue);border-left:2px solid var(--blue)}.mc.cook:hover{background:rgba(102,217,239,0.28)}
.mc.leftover{background:var(--bg4);color:var(--text3);font-style:italic;border-left:2px solid var(--text3)}
.mc.quick{background:var(--amber-bg);color:var(--amber-t);border-left:2px solid var(--amber-t)}
.mc.eatout{background:var(--coral-bg);color:var(--coral-t);border-left:2px solid var(--coral-t)}
.mc.recurring{background:var(--pink-bg);color:var(--pink-t);border-left:2px solid var(--pink-t)}
.mc.run{background:var(--teal-bg);color:var(--teal-t);border-left:2px solid var(--teal-t)}
.mc.run-actual{background:rgba(166,226,46,0.22);color:var(--green);border-left:2px solid var(--green)}
.mc.run-ghost{background:transparent;color:var(--text3);border:1px dashed var(--border2);font-style:italic}
.mc.learn{background:var(--purple-bg);color:var(--purple-t);border-left:2px solid var(--purple-t)}
.mc.event{background:var(--bg3);color:var(--text2);border-left:2px solid var(--text3)}
.mc.chore{background:rgba(230,219,116,0.08);color:var(--yellow);border-left:2px solid var(--yellow)}
.mx{font-size:8px;opacity:.7;flex-shrink:0}
.da{font-size:9px;color:var(--blue);margin-top:1px;letter-spacing:.02em}
/* View toggle (Month / 2-Week) */
.vt-grp{display:flex;gap:2px;margin-left:auto}
.vt-btn{padding:2px 9px;border:1px solid var(--border2);border-radius:var(--r);background:transparent;color:var(--text3);cursor:pointer;font-size:10px;font-family:inherit;letter-spacing:.04em;transition:all .12s}
.vt-btn.on{background:var(--blue-l);border-color:var(--blue);color:var(--blue);box-shadow:var(--glow-cyan)}
.vt-btn:hover:not(.on){color:var(--text2);border-color:var(--border2)}

/* Suggestions */
.sbox{border:1px solid var(--border);border-top:2px solid var(--yellow);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;background:var(--bg2)}
.sbox-hd{font-size:11px;font-weight:600;color:var(--yellow);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.sbox-sub{font-size:11px;color:var(--text3);margin-bottom:8px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.si{border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;cursor:pointer;transition:all .12s;background:var(--bg3)}
.si:hover{border-color:var(--blue);background:var(--blue-l);box-shadow:var(--glow-cyan)}
.si-name{font-size:12px;font-weight:500;line-height:1.4}
.si-meta{font-size:10px;color:var(--text2);margin-top:2px;display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.pill{font-size:10px;font-weight:600;padding:1px 6px;border-radius:var(--r)}
.pill-g{background:var(--green-bg);color:var(--green-t)}
.pill-a{background:var(--amber-bg);color:var(--amber-t)}

.banner{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--text3);border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--text2);margin-bottom:12px}

/* Shopping */
.sh-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sh-t{font-size:17px;font-weight:600;color:var(--yellow)}
.dbtn{padding:4px 10px;border:1px solid rgba(249,38,114,0.4);border-radius:var(--r);background:transparent;color:var(--coral-t);cursor:pointer;font-size:12px;font-weight:500;font-family:inherit}
.dbtn:hover{background:var(--coral-bg)}
.scat{margin-bottom:16px}
.scat-t{font-size:11px;font-weight:600;color:var(--yellow);text-transform:uppercase;letter-spacing:.07em;padding-bottom:4px;border-bottom:1px solid var(--border);margin-bottom:4px}
.srow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.srow:last-child{border-bottom:none}
.scb{width:14px;height:14px;cursor:pointer;accent-color:var(--blue);flex-shrink:0}
.snm{font-size:13px;flex:1}.snm.done{text-decoration:line-through;color:var(--text3)}
.sq{font-size:11px;color:var(--text2);white-space:nowrap}

/* Modal */
.ov{position:fixed;inset:0;background:rgba(30,31,28,.75);z-index:50;display:flex;align-items:center;justify-content:center}
.mdl{background:var(--bg2);border-radius:var(--r);border:1px solid var(--blue);padding:18px 20px;width:420px;max-height:85vh;overflow-y:auto;box-shadow:0 0 32px rgba(102,217,239,0.15)}
.mdl-t{font-size:15px;font-weight:600;margin-bottom:10px;color:var(--yellow)}
.mdl-sub{font-size:12px;color:var(--text2);margin-bottom:8px}
.mr{display:flex;align-items:center;gap:6px;padding:7px 9px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:3px;cursor:pointer;transition:all .12s;background:var(--bg3)}
.mr:hover{background:var(--bg4)}.mr.on{border:1px solid var(--blue);background:var(--blue-l);box-shadow:var(--glow-cyan)}
.mrn{font-size:12px;font-weight:500;flex:1;line-height:1.4}
.mft{display:flex;justify-content:flex-end;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.bc{padding:5px 12px;border:1px solid var(--border2);border-radius:var(--r);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-family:inherit}
.ba{padding:5px 14px;border:1px solid var(--blue);border-radius:var(--r);background:transparent;color:var(--blue);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .12s}
.ba:hover{background:var(--blue-l);box-shadow:var(--glow-cyan)}
.ba:disabled{opacity:.3;cursor:default}

/* Slot selector in modal */
.slot-sel{display:flex;gap:4px;margin-bottom:8px}
.slot-btn{padding:3px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:11px;cursor:pointer;background:transparent;color:var(--text3);font-family:inherit}
.slot-btn.on{background:var(--blue-l);border-color:var(--blue);color:var(--blue);box-shadow:var(--glow-cyan)}

/* Recipe panel */
.rpanel{position:fixed;right:0;top:0;bottom:0;width:380px;background:var(--bg2);border-left:1px solid var(--blue);z-index:40;overflow-y:auto;padding:18px;box-shadow:-4px 0 24px rgba(102,217,239,0.1)}
.rpanel-close{position:absolute;top:12px;right:14px;font-size:18px;cursor:pointer;color:var(--text2);background:none;border:none;font-family:inherit}
.rpanel-name{font-size:17px;font-weight:600;margin-bottom:4px;padding-right:30px;color:var(--yellow)}
.rpanel-meta{font-size:12px;color:var(--text2);margin-bottom:12px}
.rpanel-macros{display:flex;gap:8px;margin-bottom:14px}
.rpanel-macro{padding:7px 10px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--border);text-align:center;flex:1}
.rpanel-macro-val{font-size:16px;font-weight:600;color:var(--blue)}
.rpanel-macro-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.rpanel-section{font-size:11px;font-weight:600;color:var(--yellow);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px}
.rpanel-ing{font-size:13px;padding:4px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.rpanel-ing:last-child{border-bottom:none}
.rpanel-step{font-size:13px;line-height:1.6;padding:7px 0;border-bottom:1px solid var(--border);display:flex;gap:8px}
.rpanel-step:last-child{border-bottom:none}
.rpanel-stepnum{font-size:11px;font-weight:700;color:var(--blue);min-width:18px;flex-shrink:0;padding-top:2px}
.rpanel-ics{margin-top:12px;padding:7px 12px;border:1px solid var(--teal-t);border-radius:var(--r);background:var(--teal-bg);color:var(--teal-t);cursor:pointer;font-size:12px;font-weight:500;width:100%;text-align:center;font-family:inherit;transition:all .12s}
.rpanel-ics:hover{box-shadow:var(--glow-green)}

/* Pulse & running */
.pulse{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.pulse-card{padding:12px 14px;border:1px solid var(--border);border-top:2px solid var(--blue);border-radius:var(--r);background:var(--bg2)}
.pulse-val{font-size:24px;font-weight:600;color:var(--text)}.pulse-label{font-size:11px;color:var(--yellow);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.run-config{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;padding:12px;border:1px solid var(--border);border-left:3px solid var(--teal-t);border-radius:var(--r);background:var(--bg2)}
.run-field{display:flex;flex-direction:column;gap:3px}
.run-field label{font-size:11px;font-weight:600;color:var(--yellow);text-transform:uppercase;letter-spacing:.04em}
.run-field select,.run-field input{padding:4px 8px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit}

.learn-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.learn-item:last-child{border-bottom:none}
.streak-badge{background:var(--amber-bg);color:var(--amber-t);font-size:12px;font-weight:600;padding:3px 10px;border-radius:var(--r);border:1px solid var(--amber-t)}

.legend{margin-top:10px;font-size:11px;color:var(--text3);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.leg-dot{display:inline-block;width:9px;height:9px;border-radius:1px;vertical-align:middle;margin-right:3px}

/* Trip visualization */
.trip-band{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 2px;margin-bottom:2px;line-height:1.6}
.trip-mid{width:100%;height:2px;margin-bottom:2px;opacity:.4}
/* Event chip — click to view, ✕ to delete */
.mc.event{cursor:pointer}
.empty{text-align:center;color:var(--text2);padding:40px 16px;font-size:12px}
.rec-days{display:flex;gap:4px;margin-bottom:8px}
.rec-day{width:26px;height:26px;border:0.5px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;cursor:pointer;background:transparent;color:var(--text2)}
.rec-day.on{background:var(--coral-bg);border-color:var(--coral-t);color:var(--coral-t)}

/* Pantry toggle */
.pantry-item{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:0.5px solid var(--border);font-size:12px}
.pantry-item:last-child{border-bottom:none}
.pantry-toggle{width:32px;height:18px;border-radius:9px;background:var(--bg4);cursor:pointer;position:relative;transition:background .2s;border:none}
.pantry-toggle.on{background:var(--green)}
.pantry-toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s}
.pantry-toggle.on::after{left:16px}

/* v0.8 People module */
.mc.interaction{background:var(--pink-bg);color:var(--pink-t)}
.mc.interaction:hover{filter:brightness(0.95)}
.mc.birthday{background:rgba(230,219,116,0.14);color:var(--yellow);font-weight:600;border-left:2px solid var(--yellow)}

.ppl-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.ppl-title{font-size:17px;font-weight:600;margin-right:auto;color:var(--yellow)}
.ppl-filter-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.ppl-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);margin-bottom:4px;cursor:pointer;transition:border-color .12s}
.ppl-row:hover{border-color:var(--blue);background:var(--bg3);box-shadow:var(--glow-cyan)}
.ppl-avatar{width:34px;height:34px;border-radius:var(--r);background:var(--bg4);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;border:1px solid var(--blue)}
.ppl-info{min-width:0;display:flex;flex-direction:column;gap:2px}
.ppl-name{font-size:14px;font-weight:500}
.ppl-meta{font-size:11px;color:var(--text2);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.ppl-since{font-size:12px;color:var(--text2);white-space:nowrap;text-align:right}
.ppl-since.due{color:var(--amber-t);font-weight:500}
.ppl-since.overdue{color:var(--coral-t);font-weight:600}
.ppl-since.on-track{color:var(--green-t)}
.tier-badge{font-size:10px;font-weight:600;padding:1px 7px;border-radius:var(--r);white-space:nowrap}
.tier-family{background:var(--coral-bg);color:var(--coral-t)}
.tier-close{background:var(--pink-bg);color:var(--pink-t)}
.tier-friend{background:var(--teal-bg);color:var(--teal-t)}
.tier-pro{background:var(--blue-l);color:var(--blue)}
.tier-acq{background:var(--bg3);color:var(--text2)}

.ppl-empty{text-align:center;padding:40px 16px;color:var(--text2);font-size:12px}
.ppl-detail-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.ppl-detail-avatar{width:56px;height:56px;border-radius:var(--r);background:var(--bg4);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0;border:1px solid var(--blue)}
.ppl-detail-name{font-size:21px;font-weight:600;color:var(--yellow)}
.ppl-detail-sub{font-size:12px;color:var(--text2);margin-top:3px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ppl-detail-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:14px}
.ppl-stat{padding:9px 12px;border:1px solid var(--border);border-top:2px solid var(--purple-t);border-radius:var(--r);background:var(--bg2)}
.ppl-stat-val{font-size:20px;font-weight:600;color:var(--text)}
.ppl-stat-label{font-size:10px;color:var(--yellow);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.ix-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);font-size:13px}
.ix-row:last-child{border-bottom:none}
.ix-date{font-size:11px;color:var(--text3);min-width:55px}
.ix-type{font-size:10px;padding:1px 7px;border-radius:var(--r);background:var(--bg4);color:var(--text2);min-width:50px;text-align:center}
.ix-notes{flex:1;color:var(--text2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ix-rm{cursor:pointer;color:var(--text3);font-size:11px;padding:0 4px}
.ix-rm:hover{color:var(--coral-t)}

/* Edit person form */
.pf-row{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.pf-label{font-size:10px;color:var(--text3);text-transform:uppercase;font-weight:600;letter-spacing:.04em;min-width:80px}
.pf-row .sinp{margin:0;flex:1}

/* Multi-select person chips */
.ms-chips{display:flex;flex-wrap:wrap;gap:4px;padding:4px 6px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);min-height:30px;align-items:center;margin-bottom:6px}
.ms-chip{background:var(--blue-l);color:var(--blue);padding:2px 8px;border-radius:20px;font-size:11px;display:inline-flex;align-items:center;gap:4px}
.ms-chip-x{cursor:pointer;font-weight:bold}
.ms-pick{max-height:160px;overflow-y:auto;border:0.5px solid var(--border);border-radius:var(--r);background:var(--bg);margin-bottom:6px}
.ms-pick-item{padding:5px 10px;cursor:pointer;font-size:12px;border-bottom:0.5px solid var(--border)}
.ms-pick-item:last-child{border-bottom:none}
.ms-pick-item:hover{background:var(--bg2)}
.ms-pick-item.sel{background:var(--blue-l);color:var(--blue)}

/* Analytics */
.an-section{margin-bottom:20px}
.an-hdr{font-size:12px;font-weight:600;color:var(--yellow);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.an-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px}
.an-row-lbl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.an-bar-wrap{flex:2;height:6px;background:var(--bg4);border-radius:0;overflow:hidden;position:relative}
.an-bar{height:100%;border-radius:0;transition:width .3s}
.an-row-val{font-size:12px;color:var(--text2);min-width:40px;text-align:right;font-weight:600}
.an-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:4px}
.an-cell{aspect-ratio:1;border-radius:1px;background:var(--bg4);position:relative}
.an-cell.l1{background:rgba(166,226,46,.2)}
.an-cell.l2{background:rgba(166,226,46,.45)}
.an-cell.l3{background:rgba(166,226,46,.7)}
.an-cell.l4{background:var(--green)}
.an-dow{font-size:8px;text-align:center;color:var(--text3);text-transform:uppercase}
.an-spark{display:flex;align-items:flex-end;gap:1px;height:44px;padding:2px 0}
.an-spark-bar{flex:1;background:var(--blue);border-radius:1px 1px 0 0;min-height:1px;transition:height .3s}
.an-spark-bar.miss{background:var(--bg4)}

/* Day Edit Modal */
.mdl.mdl-day{width:480px}
.de-section{margin-bottom:12px;padding-bottom:10px;border-bottom:0.5px solid var(--border)}
.de-section:last-of-type{border-bottom:none}
.de-section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.de-section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.de-add-btn{font-size:10px;padding:2px 8px;border:0.5px solid var(--border2);border-radius:var(--r);background:transparent;color:var(--text2);cursor:pointer}
.de-add-btn:hover{background:var(--bg2);color:var(--text)}
.de-item{display:flex;align-items:center;gap:6px;padding:4px 6px;font-size:12px;background:var(--bg2);border-radius:var(--r);margin-bottom:3px}
.de-item-slot{font-size:8px;text-transform:uppercase;color:var(--text3);font-weight:600;min-width:16px}
.de-item-lbl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.de-item-meta{font-size:10px;color:var(--text2)}
.de-item-rm{cursor:pointer;color:var(--text3);font-size:11px;padding:0 4px}
.de-item-rm:hover{color:#A32D2D}
.de-empty{font-size:11px;color:var(--text3);font-style:italic;padding:4px 0}

/* Learning recent log with edit */
.ll-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:12px;cursor:pointer}
.ll-row:hover{background:var(--bg2)}
.ll-date{font-size:10px;color:var(--text3);min-width:55px}
.ll-topics{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ll-hrs{font-size:10px;color:var(--text2);min-width:32px;text-align:right}
.ll-exp{font-size:10px;color:var(--text3);padding:0 4px}
.ll-detail{padding:6px 8px;background:var(--bg2);border-radius:var(--r);margin:3px 0 6px;font-size:11px}
.ll-detail-row{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:0.5px solid var(--border)}
.ll-detail-row:last-child{border-bottom:none}
.ll-detail-topic{flex:1;font-weight:500}
.ll-detail-notes{flex:2;color:var(--text2);font-style:italic;font-size:10px}
.ll-detail-hrs{font-size:10px;color:var(--text2);min-width:32px;text-align:right}
.ll-detail-rm{cursor:pointer;color:var(--text3);font-size:10px;padding:0 3px}
.ll-detail-rm:hover{color:#A32D2D}

/* Topic chip for pulse analytics */
.topic-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border:0.5px solid var(--border2);border-radius:20px;font-size:10px;color:var(--text2);margin:2px}

/* Dropdown with + add */
.topic-select-wrap{display:flex;gap:4px;flex:2;min-width:120px}
.topic-select-wrap select{flex:1;padding:5px 9px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:12px;outline:none}
.topic-select-wrap select:focus{border-color:var(--blue)}
</style>

<script>
// ═══════════════════════════════════════
// RECIPE DATA

const R=[
  {id:"steak-queso-rice-skillet",name:"Steak & White Queso Rice Skillet",srv:4,cu:["Tex-Mex"],cal:720,pro:48,carb:52,fat:28,ing:[{i:"long grain white rice",q:1,u:"cup"},{i:"olive oil",q:1,u:"tbsp"},{i:"onion",q:1,u:"small"},{i:"minced garlic",q:1,u:"tbsp"},{i:"chicken broth",q:2,u:"cups"},{i:"tomato sauce",q:8,u:"oz"},{i:"salt",q:0.5,u:"tsp"},{i:"pepper",q:0.5,u:"tsp"},{i:"cumin",q:1,u:"tsp"},{i:"dried cilantro",q:1,u:"tsp"},{i:"NY strip steak",q:1.5,u:"lbs"},{i:"butter",q:2,u:"tbsp"},{i:"Montreal steak seasoning",q:null,u:"to taste"},{i:"white queso",q:null,u:"to taste"},{i:"fresh cilantro",q:null,u:"to taste"},{i:"flour tortillas",q:null,u:"as needed"}],inst:["Rinse 1 cup long grain white rice. Add to a skillet over medium-high heat with 1 tbsp olive oil and stir to toast lightly.","Add 1 small chopped onion and 1 tbsp minced garlic. Stir well.","Add 2 cups chicken broth, 8 oz tomato sauce, 0.5 tsp salt, 0.5 tsp pepper, 1 tsp cumin, and 1 tsp dried cilantro. Stir and bring to a bubble.","Once bubbling, cover, reduce heat to medium-low, and cook ~20 minutes until rice is tender.","In a separate skillet over medium-high heat, melt 2 tbsp butter. Add 1.5 lbs cubed NY strip steak and season with Montreal steak seasoning to taste. Cook to desired doneness.","Top the cooked rice with steak, pour white queso over to taste, and garnish with fresh cilantro. Serve as-is or in flour tortillas."]},
  {id:"garlic-parmesan-chicken-wraps",name:"Garlic Parmesan Chicken Wraps",srv:10,cu:["Italian"],cal:423,pro:41,carb:25,fat:18,ing:[{i:"boneless skinless chicken thighs",q:1.3,u:"lbs"},{i:"chicken breast",q:1.3,u:"lbs"},{i:"salt",q:2.5,u:"tsp"},{i:"chilli flakes",q:2,u:"tsp"},{i:"parsley",q:3,u:"tsp"},{i:"Italian herbs",q:6,u:"tsp"},{i:"paprika",q:4,u:"tsp"},{i:"garlic powder",q:4,u:"tsp"},{i:"grated parmesan",q:13.5,u:"oz"},{i:"olive oil",q:6,u:"tsp"},{i:"avocado cooking spray",q:null,u:"to taste"},{i:"light evaporated milk",q:12,u:"oz"},{i:"light butter",q:0.5,u:"oz"},{i:"low carb wraps",q:10,u:"whole"},{i:"shredded lettuce",q:null,u:"to taste"},{i:"tomato",q:null,u:"to taste"},{i:"onion",q:null,u:"to taste"}],inst:["Slice 1.3 lbs chicken breast and 1.3 lbs chicken thighs into cubes. Add 2.5 tsp salt, 2 tsp chilli flakes, 3 tsp parsley, 6 tsp Italian herbs, 4 tsp paprika, 4 tsp garlic powder, and ~10 oz of the 13.5 oz grated parmesan (reserve the rest). Drizzle with 6 tsp olive oil and mix until well coated.","In a pan over low heat, melt 0.5 oz light butter with 1 tsp Italian herbs, 1 tsp garlic powder, and 1 tsp paprika (small portion for the sauce). Toast for 1 minute.","Add 12 oz light evaporated milk and the reserved ~3.5 oz grated parmesan to the sauce pan. Stir until smooth and creamy.","Line a sheet pan with parchment paper. Spread marinated chicken evenly without overcrowding. Spray lightly with avocado cooking spray.","Bake in a preheated oven at 390°F for 20-22 minutes until crispy.","While chicken is still hot, toss with a sprinkle of reserved parmesan and fresh parsley until well coated.","Assemble 10 low carb wraps with shredded lettuce, chopped onion, chopped tomato, crispy chicken, and creamy garlic parmesan sauce.","Storage: keep chicken and sauce in separate containers in the fridge. Reheat chicken in oven or air fryer at 355°F for 4-5 minutes. Warm sauce in a pan before serving."]},
  {id:"korean-popcorn-chicken",name:"Korean Popcorn Chicken",srv:4,cu:["Korean"],cal:580,pro:42,carb:58,fat:14,ing:[{i:"chicken breast",q:2,u:"lbs"},{i:"eggs",q:2,u:"whole"},{i:"soy sauce",q:3,u:"tbsp"},{i:"salt",q:0.75,u:"tsp"},{i:"black pepper",q:0.75,u:"tsp"},{i:"garlic powder",q:1.5,u:"tsp"},{i:"ginger powder",q:1,u:"tsp"},{i:"cornstarch",q:1,u:"cup"},{i:"flour",q:3,u:"tbsp"},{i:"baking powder",q:0.75,u:"tsp"},{i:"gochujang",q:0.33,u:"cup"},{i:"brown sugar",q:3,u:"tbsp"},{i:"ketchup",q:3,u:"tbsp"},{i:"honey",q:4,u:"tbsp"},{i:"garlic",q:3,u:"cloves"},{i:"rice vinegar",q:3,u:"tbsp"},{i:"sesame oil",q:1.5,u:"tbsp"},{i:"butter",q:1,u:"tbsp"},{i:"green onions",q:null,u:"to taste"},{i:"sesame seeds",q:null,u:"to taste"}],inst:["In a large bowl, combine 2 lbs cubed chicken breast, 2 eggs, 1.5 tbsp soy sauce (from 3 tbsp total), 0.75 tsp salt, 0.75 tsp black pepper, 1.5 tsp garlic powder, and 1 tsp ginger powder. Mix until fully coated.","Add 1 cup cornstarch, 3 tbsp flour, and 0.75 tsp baking powder. Toss until evenly coated.","Air fryer: Preheat to 400°F. Cook 8 minutes, flip, then cook another 4 minutes until crispy. Oven: Bake at 425°F for 15-20 minutes, flipping halfway.","In a pan over medium heat, combine 0.33 cup gochujang, 3 tbsp brown sugar, 3 tbsp ketchup, 4 tbsp honey, 3 cloves minced garlic, remaining 1.5 tbsp soy sauce, 3 tbsp rice vinegar, and 1.5 tbsp sesame oil. Simmer 3-4 minutes until thick, then turn off heat and whisk in 1 tbsp butter.","Add crispy chicken to a bowl and pour in ~½ cup sauce. Toss until fully coated, adding more sauce as needed.","Serve over rice topped with green onions and sesame seeds to taste."]},
  {id:"one-pot-pesto-chicken-rice",name:"One Pot Pesto Chicken Rice",srv:3,cu:["Italian"],cal:564,pro:33,carb:72,fat:15,ing:[{i:"onion",q:1,u:"whole"},{i:"chicken breast",q:10.5,u:"oz"},{i:"sundried tomatoes",q:2.75,u:"oz"},{i:"garlic",q:2,u:"tsp"},{i:"Italian herbs",q:2,u:"tsp"},{i:"salt",q:null,u:"to taste"},{i:"pepper",q:null,u:"to taste"},{i:"reduced fat red pesto",q:0.75,u:"oz"},{i:"chicken stock",q:1.75,u:"cups"},{i:"long grain white rice",q:1.25,u:"cups"},{i:"heavy cream",q:0.33,u:"cup"},{i:"fresh basil",q:null,u:"to taste"}],inst:["Fry 10.5 oz chicken breast, 1 chopped onion, and 2.75 oz sundried tomatoes in a pan until softened and cooked through.","Add 2 tsp garlic and 2 tsp Italian herbs, plus salt and pepper to taste. Stir well.","Stir in 0.75 oz reduced fat red pesto, then add 1.75 cups chicken stock and 1.25 cups long grain white rice (uncooked).","Bring to a boil, then reduce heat, cover, and simmer for 20 minutes until liquid is absorbed and rice is cooked.","Stir in 0.33 cup heavy cream and fresh basil (to taste) just before serving."]},
  {id:"steak-chicken-hibachi-fried-rice",name:"Steak & Chicken Hibachi Fried Rice",srv:4,cu:["Japanese"],cal:640,pro:52,carb:48,fat:22,ing:[{i:"chicken breast",q:1,u:"lb"},{i:"NY strip steak",q:1,u:"lb"},{i:"soy sauce",q:5,u:"tbsp"},{i:"oyster sauce",q:2,u:"tbsp"},{i:"sesame oil",q:2,u:"tsp"},{i:"honey",q:1,u:"tbsp"},{i:"white pepper",q:1,u:"tsp"},{i:"garlic",q:7,u:"cloves"},{i:"ginger",q:1,u:"tsp"},{i:"black pepper",q:0.5,u:"tsp"},{i:"butter",q:0.33,u:"cup"},{i:"onion",q:1.5,u:"medium"},{i:"zucchini",q:1,u:"whole"},{i:"cooked white rice",q:2,u:"cups"},{i:"eggs",q:2,u:"whole"},{i:"green onions",q:0.25,u:"cup"}],inst:["Dice 1 lb chicken breast and 1 lb NY strip steak. Split these marinade amounts across the two proteins: 5 tbsp soy sauce, 2 tbsp oyster sauce, 2 tsp sesame oil, 1 tbsp honey, 1 tsp white pepper, 0.5 tsp black pepper, ~4 cloves grated garlic (from 7 total), and 1 tsp grated ginger.","Cook both proteins on medium-high heat. Steak takes ~2-3 minutes — remove first. Once chicken reaches 160°F internal, add steak back in along with 1 tbsp garlic butter.","For garlic butter: combine 0.33 cup softened butter, remaining ~3 cloves grated garlic, and a splash of soy sauce. Mix well.","In a separate pan, sauté 1.5 medium chopped onions and 1 diced zucchini with 1 tbsp garlic butter until softened.","Add 2 cups day-old cooked white rice and let crisp for ~2 minutes.","Push rice to the side, add a little oil, and add 2 whisked eggs. Scramble, then mix into rice.","Add an additional splash of soy sauce, oyster sauce, and sesame oil. Finish with remaining garlic butter and 0.25 cup chopped green onions.","Plate fried rice with veggies and top with steak and chicken."]},
  {id:"cheesy-taco-rice",name:"Cheesy Taco Rice",srv:4,cu:["Tex-Mex"],cal:510,pro:38,carb:62,fat:12,ing:[{i:"onion",q:1,u:"whole"},{i:"lean ground beef",q:1.1,u:"lbs"},{i:"taco seasoning",q:null,u:"to taste"},{i:"beef stock cubes",q:2,u:"whole"},{i:"jasmine rice",q:1.5,u:"cups"},{i:"tomato paste",q:2,u:"tbsp"},{i:"shredded light cheese",q:0.75,u:"cup"}],inst:["Dice 1 onion and fry in a pan until softened.","Add 1.1 lbs lean ground beef and cook through, breaking up as it cooks.","Season with taco seasoning to taste.","Dissolve 2 beef stock cubes in 3 cups boiling water and add to the pan along with 2 tbsp tomato paste. Stir well.","Add 1.5 cups dry jasmine rice, stir, bring to a boil, then reduce heat, cover, and simmer ~20 minutes until rice is cooked and liquid is absorbed.","Top with 0.75 cup shredded light cheese and serve. Optional: scoop with nacho chips or Doritos."]},
  {id:"garlic-naan",name:"Garlic Naan",srv:7,cu:["Indian"],cal:280,pro:7,carb:38,fat:11,ing:[{i:"warm water",q:0.75,u:"cup"},{i:"sugar",q:1,u:"tsp"},{i:"yeast",q:2,u:"tsp"},{i:"bread flour",q:3,u:"cups"},{i:"olive oil",q:0.5,u:"cup"},{i:"plain yogurt",q:0.33,u:"cup"},{i:"salt",q:0.5,u:"tbsp"},{i:"minced garlic",q:1.5,u:"tbsp"},{i:"fresh cilantro",q:null,u:"to taste"},{i:"cooking spray",q:null,u:"to taste"}],inst:["Mix 0.75 cup warm water, 1 tsp sugar, and 2 tsp yeast. Let sit 10-15 minutes until foamy. If it doesn't foam, the yeast is dead — start over.","In a large bowl combine 3 cups bread flour, 0.5 cup olive oil, 0.33 cup plain yogurt, the yeast mixture, and 0.5 tbsp salt. Mix until it clumps, then knead by hand for 15 minutes.","Place dough in a bowl, cover with a towel, and let rise in a warm place until doubled in size (~2 hours). Tip: warm oven to 170°F, turn it off, then place dough inside.","Divide into 6-8 pieces and flatten each with a rolling pin.","Heat a pan to high, spray with cooking spray, and fry each naan 1-2 minutes per side until golden. Spray again before flipping.","For garlic cilantro oil: simmer additional olive oil with 1.5 tbsp minced garlic and a pinch of salt on low. Remove from heat and stir in chopped fresh cilantro (to taste).","Brush garlic oil over naan and serve with butter chicken or tikka masala."]},
  {id:"korean-vegetable-pancakes",name:"Korean Vegetable Pancakes (Pajeon)",srv:4,cu:["Korean"],cal:210,pro:5,carb:30,fat:8,ing:[{i:"flour",q:1,u:"cup"},{i:"kosher salt",q:0.5,u:"tsp"},{i:"water",q:1,u:"cup"},{i:"leek greens",q:1,u:"cup"},{i:"carrot",q:0.5,u:"cup"},{i:"scallions",q:3,u:"whole"},{i:"red cabbage",q:0.5,u:"cup"},{i:"jalapeño",q:1,u:"whole"},{i:"avocado oil",q:2,u:"tbsp"},{i:"soy sauce",q:2,u:"tbsp"},{i:"lemon juice",q:1,u:"tbsp"},{i:"sesame oil",q:1,u:"tbsp"},{i:"sesame seeds",q:1,u:"tsp"}],inst:["Mix 1 cup flour, 0.5 tsp kosher salt, and 1 cup water together in a bowl until smooth.","Add 1 cup leek greens, 0.5 cup grated carrot, 3 scallions (chopped), 0.5 cup red cabbage, and 1 sliced jalapeño. Mix until combined.","In a separate small bowl, whisk together 2 tbsp soy sauce, 1 tbsp lemon juice, a splash of water, 1 tbsp sesame oil, and 1 tsp sesame seeds to make the dipping sauce. Set aside.","Preheat a large pan over medium heat and add 2 tbsp avocado oil.","Scoop ¼ cup batter per pancake, flatten slightly with a spatula, and cook 2-3 minutes per side until golden brown.","Transfer to a paper towel-lined plate to drain excess oil.","Serve with dipping sauce."]},
  {id:"big-mac-smash-tacos",name:"Big Mac Smash Tacos",srv:4,cu:["American"],cal:105,pro:16,carb:8,fat:4,ing:[{i:"low carb tortillas",q:4,u:"whole"},{i:"extra lean ground beef",q:0.5,u:"lbs"},{i:"fat free cheese slices",q:4,u:"whole"},{i:"pickles",q:null,u:"to taste"},{i:"shredded lettuce",q:null,u:"to taste"},{i:"onion",q:null,u:"to taste"},{i:"greek yogurt",q:0.33,u:"cup"},{i:"sugar free ketchup",q:2,u:"tbsp"},{i:"dill relish",q:2,u:"tbsp"},{i:"mustard",q:2,u:"tsp"},{i:"distilled white vinegar",q:2,u:"tsp"},{i:"onion powder",q:0.5,u:"tsp"},{i:"salt",q:null,u:"to taste"},{i:"pepper",q:null,u:"to taste"}],inst:["Mix 0.33 cup greek yogurt, 2 tbsp sugar-free ketchup, 2 tbsp dill relish, 2 tsp mustard, 2 tsp distilled white vinegar, 0.5 tsp onion powder, plus salt and pepper to taste to make Big Mac sauce. Set aside.","Preheat pan to high.","Divide 0.5 lbs extra lean ground beef into 4 portions (2 oz each). Spread one portion evenly over each of 4 low carb tortillas.","Place tortillas meat-side down in the hot pan and cook until beef is browned.","Flip and immediately add 1 fat-free cheese slice per tortilla (4 total).","Top with pickles, shredded lettuce, diced onion, and Big Mac sauce (all to taste). Serve immediately."]},
  {id:"salt-pepper-chicken-chips",name:"Crispy Salt & Pepper Chicken and Chips",srv:4,cu:["Asian"],cal:436,pro:40,carb:47,fat:10,ing:[{i:"chicken breast",q:1.5,u:"lbs"},{i:"dark soy sauce",q:1,u:"tbsp"},{i:"low sodium soy sauce",q:1,u:"tbsp"},{i:"black pepper",q:2,u:"tsp"},{i:"garlic powder",q:2,u:"tsp"},{i:"cornstarch",q:3.5,u:"tbsp"},{i:"white potatoes",q:1.75,u:"lbs"},{i:"season salt",q:null,u:"to taste"},{i:"paprika",q:null,u:"to taste"},{i:"olive oil",q:2,u:"tsp"},{i:"onion",q:1,u:"medium"},{i:"red bell pepper",q:1,u:"medium"},{i:"green bell pepper",q:1,u:"medium"},{i:"chilli flakes",q:null,u:"to taste"},{i:"green onions",q:null,u:"to taste"}],inst:["Cube 1.5 lbs chicken breast and toss with 1 tbsp dark soy sauce, 1 tbsp low sodium soy sauce, 2 tsp black pepper, 2 tsp garlic powder, and 3.5 tbsp cornstarch until well coated.","Cook chicken: air fry at 392°F for 10-12 minutes, or pan fry per preference.","Cut 1.75 lbs white potatoes into chips and season with season salt, pepper, garlic powder, and paprika (to taste). Toss with 2 tsp olive oil.","Cook chips: bake at 410°F for 25 minutes, or air fry at 410°F for 12-15 minutes.","In a pan, sauté 1 medium chopped onion, 1 red bell pepper, and 1 green bell pepper. Season with salt, pepper, garlic, paprika, and chilli flakes to taste.","Combine chicken with sautéed vegetables and serve over chips. Garnish with chopped green onion.","Reheat tip: reheat chips in a pan or air fryer to restore crispiness."]},

function generateRunPlan(raceDate,distance,goalTime,level){
  const race=new Date(raceDate+"T12:00:00"),now=new Date();now.setHours(12,0,0,0);
  const totalDays=Math.floor((race-now)/864e5),totalWeeks=Math.floor(totalDays/7);
  if(totalWeeks<4)return[];
  const goalPace=goalTime/distance;
  const paces={easy:goalPace+1.5,tempo:goalPace+0.3,speed:goalPace-0.3,long:goalPace+1.0,race:goalPace};
  const plan=[],runDays=level==="beginner"?[1,3,6]:level==="intermediate"?[1,2,4,6]:[1,2,3,5,6];
  const taperW=Math.max(1,Math.round(totalWeeks*0.08)),peakW=Math.max(1,Math.round(totalWeeks*0.12)),buildW=Math.max(1,Math.round(totalWeeks*0.25)),baseW=totalWeeks-taperW-peakW-buildW;
  for(let w=0;w<totalWeeks;w++){
    let phase,intensity;
    if(w<baseW){phase="Base";intensity=0.6+0.2*(w/baseW);}
    else if(w<baseW+buildW){phase="Build";intensity=0.8+0.15*((w-baseW)/buildW);}
    else if(w<baseW+buildW+peakW){phase="Peak";intensity=0.95;}
    else{phase="Taper";intensity=0.5+0.3*((totalWeeks-1-w)/taperW);}
    const ws=new Date(now);ws.setDate(ws.getDate()+w*7);
    for(let d=0;d<7;d++){
      const day=new Date(ws);day.setDate(day.getDate()+d);if(day>race)break;
      const dk=dkf(day),dow=day.getDay();
      if(dk===raceDate){plan.push({date:dk,type:"RACE",dist:distance,pace:paces.race,phase:"Race Day"});break;}
      if(!runDays.includes(dow))continue;
      let type,dist,pace;
      if(dow===6){type="Long Run";dist=Math.round(distance*intensity*10)/10;pace=paces.long;}
      else if(dow===3||dow===2){type="Tempo";dist=Math.round(distance*0.4*intensity*10)/10;pace=paces.tempo;}
      else if(dow===5){type="Speed";dist=Math.round(distance*0.3*intensity*10)/10;pace=paces.speed;}
      else{type="Easy Run";dist=Math.round(distance*0.35*intensity*10)/10;pace=paces.easy;}
      if(phase==="Taper"){type="Easy Run";pace=paces.easy;dist=Math.max(1,dist*0.6);}
      dist=Math.round(Math.max(1,Math.min(dist,distance*1.2))*10)/10;
      plan.push({date:dk,type,dist,pace:Math.round(pace*10)/10,phase});
    }
  }
  // Dedup by date — keep first entry per date
  const seen=new Set(),deduped=[];
  plan.forEach(r=>{if(!seen.has(r.date)){seen.add(r.date);deduped.push(r);}});
  return deduped;
}
function fmtPace(p){const m=Math.floor(p),s=Math.round((p-m)*60);return m+":"+(s<10?"0":"")+s;}
function parsePace(s){if(!s)return 0;const parts=s.split(':');if(parts.length===2){const m=parseInt(parts[0]),sec=parseInt(parts[1]);return m+(sec/60);}return parseFloat(s)||0;}

function makeVEVENT(title,date,durationMin,desc){
  const d=date.replace(/-/g,""),start=d+"T180000",h=Math.floor(durationMin/60),m=durationMin%60;
  const end=d+"T"+(18+h<10?"0":"")+(18+h)+(m<10?"0":"")+m+"00";
  const uid=d+"-"+Math.random().toString(36).slice(2,8)+"@sol";
  return`BEGIN:VEVENT\r\nUID:${uid}\r\nDTSTART:${start}\r\nDTEND:${end}\r\nSUMMARY:[SOL] ${title}\r\nDESCRIPTION:${(desc||"").replace(/\n/g,"\\n")}\r\nCLASS:PRIVATE\r\nEND:VEVENT`;
}

function migrate(){
  // Try loading from old keys
  const oldKeys=["sol_v5","sol_v4","mealplanner_v3"];
  for(const k of oldKeys){
    try{const raw=localStorage.getItem(k);if(raw){const old=JSON.parse(raw);
      // Migrate old format to new
      const s=defaults();
      // Convert old cooks to new meals format (all go to dinner slot)
      if(old.cooks){Object.entries(old.cooks).forEach(([dk,ids])=>{if(!s.meals[dk])s.meals[dk]={breakfast:[],lunch:[],dinner:[]};ids.forEach(id=>s.meals[dk].dinner.push({type:"cook",id}));});}
      if(old.quickDays){Object.entries(old.quickDays).forEach(([dk,names])=>{if(!s.meals[dk])s.meals[dk]={breakfast:[],lunch:[],dinner:[]};names.forEach(n=>s.meals[dk].dinner.push({type:"quick",name:n}));});}
      if(old.eatoutDays){Object.entries(old.eatoutDays).forEach(([dk,labels])=>{if(!s.meals[dk])s.meals[dk]={breakfast:[],lunch:[],dinner:[]};labels.forEach(l=>s.meals[dk].dinner.push({type:"eatout",name:l}));});}
      if(old.quickMeals)s.quickMeals=old.quickMeals;
      if(old.recurringEatout)s.recurringEatout=old.recurringEatout;
      if(old.tfStart)s.activeRun.start=old.tfStart;
      if(old.tfEnd)s.activeRun.end=old.tfEnd;
      if(old.chk)s.activeRun.chk=old.chk;
      if(old.shopArchive)s.shopArchive=old.shopArchive;
      if(old.runPlan)s.runPlan=old.runPlan;
      if(old.runDays)s.runDays=old.runDays;
      if(old.actualRuns)s.actualRuns=old.actualRuns;
      // Migrate learnLog: old format {date:{topic,duration/hours}} → new {date:[{topic,hours}]}
      if(old.learnLog){Object.entries(old.learnLog).forEach(([dk,entry])=>{if(Array.isArray(entry))s.learnLog[dk]=entry;else s.learnLog[dk]=[{topic:entry.topic,hours:entry.hours||Math.round((entry.duration||0)/60*100)/100,notes:entry.notes||""}];});}
      if(old.learnQueue)s.learnTopics=[...new Set([...s.learnTopics,...old.learnQueue])];
      if(old.learnTopics)s.learnTopics=[...new Set([...s.learnTopics,...old.learnTopics])];
      // Backfill any topics appearing in log
      Object.values(s.learnLog).forEach(entries=>{if(Array.isArray(entries))entries.forEach(e=>{if(e.topic&&!s.learnTopics.includes(e.topic))s.learnTopics.push(e.topic);});});
      if(old.events)s.events=old.events;
      return s;
    }}catch(e){}}
  return null;
}

function loadState(){
  try{const raw=localStorage.getItem(SK);if(raw){const d=JSON.parse(raw);
    // Migrations — RUN BEFORE filling defaults so newer defaults don't leak in as if they were user data
    const needsMigration=d._schemaVersion!==8;
    if(needsMigration){
      // Save a one-time backup of the pre-migration data under a versioned key so it's recoverable
      try{
        const backupKey="sol_data_backup_v"+(d._schemaVersion||"unknown");
        if(!localStorage.getItem(backupKey))localStorage.setItem(backupKey,raw);
      }catch(_){}
    }
    // v6 → v7: learnQueue → learnTopics (from user's own data, not defaults)
    if(d._schemaVersion!==7&&d._schemaVersion!==8){
      const topics=[];const seen=new Set();
      const pushTopic=t=>{if(t&&!seen.has(t)){seen.add(t);topics.push(t);}};
      if(Array.isArray(d.learnTopics))d.learnTopics.forEach(pushTopic);
      if(Array.isArray(d.learnQueue))d.learnQueue.forEach(pushTopic);
      if(d.learnLog)Object.values(d.learnLog).forEach(entries=>{if(Array.isArray(entries))entries.forEach(e=>pushTopic(e.topic));});
      d.learnTopics=topics;
      delete d.learnQueue;
      d._schemaVersion=7;
    }
    // v7 → v8: add people + interactions (empty objects; no data to transform)
    if(d._schemaVersion===7){
      if(!d.people)d.people={};
      if(!d.interactions)d.interactions={};
      d._schemaVersion=8;
    }
    // Now fill in any missing top-level keys from defaults (for genuinely new fields in future schema bumps)
    const def=defaults();for(const k of Object.keys(def)){if(!(k in d))d[k]=def[k];}
    // Seed default chore templates if the array is empty (user may have gotten an empty array before defaults were added)
    if(Array.isArray(d.choreTemplates)&&d.choreTemplates.length===0)d.choreTemplates=def.choreTemplates;
    // Dedup runDays by date on every load
    if(d.runDays&&d.runDays.length){const seen=new Set(),clean=[];d.runDays.forEach(r=>{if(!seen.has(r.date)){seen.add(r.date);clean.push(r);}});d.runDays=clean;}
    // Defensive: make sure any topic present in logs is in the dropdown
    if(d.learnLog&&Array.isArray(d.learnTopics)){
      const known=new Set(d.learnTopics);
      Object.values(d.learnLog).forEach(entries=>{if(Array.isArray(entries))entries.forEach(e=>{if(e.topic&&!known.has(e.topic)){d.learnTopics.push(e.topic);known.add(e.topic);}});});
    }
    return d;
  }}catch(e){}
  const migrated=migrate();
  if(migrated){
    // Clear old keys after successful migration
    ["sol_v5","sol_v4","mealplanner_v3"].forEach(k=>{try{localStorage.removeItem(k);}catch(e){}});
    return migrated;
  }
  return defaults();
}

function buildEff(){
  const eff={};
  // Meals (breakfast/lunch/dinner)
  Object.entries(S.meals).forEach(([dk,slots])=>{
    if(!eff[dk])eff[dk]=[];
    SLOTS.forEach(sl=>{(slots[sl]||[]).forEach(e=>{
      eff[dk].push({...e,slot:sl,src:dk});
    });});
  });
  // Leftovers from cook entries (dinner slot)
  Object.entries(S.meals).forEach(([dk,slots])=>{
    (slots.dinner||[]).forEach(e=>{
      if(e.type!=="cook")return;
      const r=R.find(x=>x.id===e.id);if(!r)return;
      const lo=getLeftoverCount(r.srv);if(lo<=0)return;
      const base=new Date(dk+"T12:00:00");
      for(let d=1;d<=lo;d++){
        const next=new Date(base);next.setDate(next.getDate()+d);const nk=dkf(next);
        if(!eff[nk])eff[nk]=[];
        if(!eff[nk].some(x=>x.id===e.id&&x.type==="cook"&&x.slot==="dinner"))
          eff[nk].push({type:"leftover",id:e.id,slot:"dinner",src:dk});
      }
    });
  });
  // Recurring eat out
  if(S.recurringEatout.length>0){
    const end=new Date(today.getFullYear(),today.getMonth()+31,0);
    for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
      if(S.recurringEatout.includes(d.getDay())){
        const k=dkf(d);if(!eff[k])eff[k]=[];
        if(!eff[k].some(e=>(e.type==="eatout"||e.type==="recurring")&&e.slot==="dinner"))
          eff[k].push({type:"recurring",name:"Eat out ("+DWS[d.getDay()]+")",slot:"dinner",src:k});
      }
    }
  }
  // Runs — dedup by date, actual shown solid, planned shown ghost if actual exists
  const seenRunDates=new Set();
  S.runDays.forEach(r=>{const k=r.date;if(seenRunDates.has(k))return;seenRunDates.add(k);
    if(!eff[k])eff[k]=[];
    const actual=S.actualRuns[k];
    if(actual){
      eff[k].push({type:"run-actual",name:actual.dist+"mi "+fmtPace(actual.pace||0),dist:actual.dist,pace:actual.pace,src:k});
      eff[k].push({type:"run-ghost",name:"plan: "+r.dist+"mi",dist:r.dist,pace:r.pace,phase:r.phase,src:k});
    }else{
      eff[k].push({type:"run",name:r.type+" "+r.dist+"mi",dist:r.dist,pace:r.pace,phase:r.phase,src:k});
    }
  });
  // Actual runs on non-plan days
  Object.entries(S.actualRuns).forEach(([dk,r])=>{
    if(!S.runDays.some(p=>p.date===dk)){
      if(!eff[dk])eff[dk]=[];
      eff[dk].push({type:"run-actual",name:r.dist+"mi "+(r.pace?fmtPace(r.pace):""),dist:r.dist,pace:r.pace,src:dk});
    }
  });
  // Learn
  Object.entries(S.learnLog).forEach(([dk,entries])=>{if(!eff[dk])eff[dk]=[];
    const total=entries.reduce((s,e)=>s+(e.hours||0),0);
    eff[dk].push({type:"learn",name:Math.round(total*100)/100+"h learn",src:dk});
  });
  // Events
  Object.entries(S.events).forEach(([dk,list])=>{if(!eff[dk])eff[dk]=[];list.forEach(ev=>eff[dk].push({type:"event",name:ev.title,time:ev.time,category:ev.category,src:dk}));});
  // v0.8: Interactions on the day they happened
  Object.entries(S.interactions||{}).forEach(([dk,list])=>{if(!eff[dk])eff[dk]=[];list.forEach(iv=>{
    const names=(iv.personIds||[]).map(pid=>(S.people?.[pid]?.name)||"?").filter(Boolean);
    const lbl=names.length?names.join(", "):"(unknown)";
    eff[dk].push({type:"interaction",name:lbl+(iv.type?" ("+iv.type+")":""),iid:iv.id,src:dk});
  });});
  // v0.8: Birthdays — auto-show on the birthday each year within the viewed window.
  // Birthday format can be "MM-DD" or "YYYY-MM-DD". We render for the current calendar
  // view year and the next year (cheap to compute; visible on every month the user opens).
  if(S.people){
    const years=[vY,vY+1];
    Object.values(S.people).forEach(p=>{
      if(!p.birthday)return;
      const parts=p.birthday.split("-");
      let mm,dd;
      if(parts.length===3){mm=parts[1];dd=parts[2];}
      else if(parts.length===2){mm=parts[0];dd=parts[1];}
      else return;
      years.forEach(y=>{
        const dk=y+"-"+mm+"-"+dd;
        if(!eff[dk])eff[dk]=[];
        // Don't double-add if a previous render already put the same birthday chip in
        if(!eff[dk].some(e=>e.type==="birthday"&&e.personId===p.id)){
          eff[dk].push({type:"birthday",name:"🎂 "+p.name,personId:p.id,src:dk});
        }
      });
    });
  }
  // Chore templates — generate occurrences for a rolling window
  const choreWinStart=new Date(vY,vM-2,1);const choreWinEnd=new Date(vY,vM+3,0);
  (S.choreTemplates||[]).forEach(t=>{
    let d=new Date(choreWinStart);
    while(d.getDay()!==t.dow)d.setDate(d.getDate()+1);
    while(d<=choreWinEnd){
      const dk=dkf(d);
      const override=(S.choreOverrides||[]).find(o=>o.templateId===t.id&&o.originalDate===dk);
      if(!override){if(!eff[dk])eff[dk]=[];eff[dk].push({type:"chore",name:t.name,templateId:t.id,originalDate:dk});}
      d.setDate(d.getDate()+7);
    }
  });
  (S.choreOverrides||[]).forEach(o=>{
    if(!o.movedTo)return;
    const t=(S.choreTemplates||[]).find(x=>x.id===o.templateId);if(!t)return;
    if(!eff[o.movedTo])eff[o.movedTo]=[];
    if(!eff[o.movedTo].some(e=>e.type==="chore"&&e.templateId===t.id&&e.originalDate===o.originalDate))
      eff[o.movedTo].push({type:"chore",name:t.name,templateId:t.id,originalDate:o.originalDate,movedFrom:o.originalDate});
  });
  return eff;
}

// ICS IMPORT ENGINE
// ═══════════════════════════════════════
function parseICSDate(val,params){
  // val: "20260502" | "20260502T180000Z" | "20260502T180000"
  // params: e.g. "VALUE=DATE" | "TZID=America/Chicago" | ""
  const isDate=params.includes('VALUE=DATE')||(val.length===8&&!val.includes('T'));
  const ymd=val.slice(0,4)+'-'+val.slice(4,6)+'-'+val.slice(6,8);
  if(isDate)return{dk:ymd,time:null};
  const time=val.length>=13?val.slice(9,11)+':'+val.slice(11,13):null;
  return{dk:ymd,time};
}

function expandRRule(rrule,startDk,time,title,notes){
  const p={};
  rrule.split(';').forEach(s=>{const[k,v]=s.split('=');if(k)p[k]=v;});
  const freq=p.FREQ;
  if(!['DAILY','WEEKLY','MONTHLY','YEARLY'].includes(freq))return[];
  const maxCount=p.COUNT?Math.min(parseInt(p.COUNT),500):500;
  const untilStr=p.UNTIL?p.UNTIL.replace(/[^0-9]/g,'').slice(0,8):null;
  const interval=p.INTERVAL?parseInt(p.INTERVAL):1;
  const byDay=p.BYDAY?p.BYDAY.split(','):null;
  const DAY={SU:0,MO:1,TU:2,WE:3,TH:4,FR:5,SA:6};
  const maxDate=new Date(today.getFullYear()+2,today.getMonth(),today.getDate());
  const results=[];
  let cur=parsedk(startDk);
  let count=0;
  const push=dk=>{results.push({dk,time,title,notes});count++;};
  const overLimit=()=>count>=maxCount||cur>maxDate;
  const pastUntil=dk=>untilStr&&dk.replace(/-/g,'')>untilStr;

  if(freq==='WEEKLY'&&byDay&&byDay.length>1){
    // Multi-day weekly: walk day-by-day within valid weeks
    const days=new Set(byDay.map(d=>DAY[d]).filter(n=>n!=null));
    cur=parsedk(startDk);cur.setDate(cur.getDate()+1);
    while(!overLimit()){
      const dk=dkf(cur);if(pastUntil(dk))break;
      if(days.has(cur.getDay()))push(dk);
      cur.setDate(cur.getDate()+1);
    }
    return results;
  }

  // Advance past the original occurrence first
  if(freq==='DAILY')cur.setDate(cur.getDate()+interval);
  else if(freq==='WEEKLY')cur.setDate(cur.getDate()+7*interval);
  else if(freq==='MONTHLY')cur.setMonth(cur.getMonth()+interval);
  else if(freq==='YEARLY')cur.setFullYear(cur.getFullYear()+interval);

  while(!overLimit()){
    const dk=dkf(cur);if(pastUntil(dk))break;
    push(dk);
    if(freq==='DAILY')cur.setDate(cur.getDate()+interval);
    else if(freq==='WEEKLY')cur.setDate(cur.getDate()+7*interval);
    else if(freq==='MONTHLY')cur.setMonth(cur.getMonth()+interval);
    else if(freq==='YEARLY')cur.setFullYear(cur.getFullYear()+interval);
    else break;
  }
  return results;
}

function parseICS(raw){
  // Unfold folded lines (RFC 5545: CRLF + whitespace = continuation)
  const text=raw.replace(/\r\n[ \t]/g,'').replace(/\n[ \t]/g,'');
  const lines=text.split(/\r?\n/);
  const events=[];
  let inV=false,cur={};
  for(const line of lines){
    if(line==='BEGIN:VEVENT'){inV=true;cur={};continue;}
    if(line==='END:VEVENT'){inV=false;if(cur.dtstart)events.push(cur);cur={};continue;}
    if(!inV)continue;
    const ci=line.indexOf(':');if(ci<0)continue;
    const propFull=line.slice(0,ci),val=line.slice(ci+1);
    const si=propFull.indexOf(';');
    const prop=si>=0?propFull.slice(0,si):propFull;
    const params=si>=0?propFull.slice(si+1):'';
    const clean=s=>s.replace(/\\,/g,',').replace(/\\n/g,' ').replace(/\\;/g,';').replace(/\\t/g,' ').trim();
    if(prop==='SUMMARY')cur.title=clean(val);
    else if(prop==='DESCRIPTION')cur.notes=clean(val);
    else if(prop==='DTSTART')cur.dtstart=parseICSDate(val.trim(),params);
    else if(prop==='RRULE')cur.rrule=val.trim();
    else if(prop==='STATUS')cur.status=val.trim();
  }
  return events;
}

window.handleICSFile=input=>{
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const evs=parseICS(e.target.result);
    let added=0,skipped=0,recurring=0;
    const addEv=(dk,title,time,notes)=>{
      if(!title||!dk){skipped++;return false;}
      if(!S.events[dk])S.events[dk]=[];
      // Deduplicate: same title same day
      if(S.events[dk].some(x=>x.title===title)){skipped++;return false;}
      const ev={title};
      if(time)ev.time=time;
      if(notes)ev.notes=notes.slice(0,300);
      S.events[dk].push(ev);
      added++;return true;
    };
    for(const ev of evs){
      if(ev.status==='CANCELLED'){skipped++;continue;}
      const{dk,time}=ev.dtstart;
      addEv(dk,ev.title||'(no title)',time,ev.notes||'');
      if(ev.rrule){
        const expanded=expandRRule(ev.rrule,dk,time,ev.title||'(no title)',ev.notes||'');
        expanded.forEach(r=>addEv(r.dk,r.title,r.time,r.notes)&&recurring++);
      }
    }
    icsImportResult={added,skipped,recurring,total:evs.length,file:file.name};
    input.value='';
    save();render();
  };
  reader.readAsText(file);
};

function calDays(y,m){const f=new Date(y,m,1),l=new Date(y,m+1,0),days=[];for(let i=0;i<f.getDay();i++)days.push({d:new Date(y,m,-(f.getDay()-i-1)),mine:false});for(let i=1;i<=l.getDate();i++)days.push({d:new Date(y,m,i),mine:true});while(days.length%7!==0){const p=days[days.length-1].d;days.push({d:new Date(p.getFullYear(),p.getMonth(),p.getDate()+1),mine:false});}return days;}

// 2-week view helpers
function getTwoWeekStart(){
  if(twoWeekStart) return new Date(twoWeekStart);
  const d=new Date(today);d.setDate(d.getDate()-d.getDay());d.setHours(0,0,0,0);return d;
}
function calDays2Week(start){
  const days=[];
  for(let i=0;i<14;i++){const d=new Date(start);d.setDate(start.getDate()+i);d.setHours(0,0,0,0);days.push({d,mine:true});}
  return days;
}
function fmt2WkTitle(start){
  const end=new Date(start);end.setDate(end.getDate()+13);
  const sm=MOS[start.getMonth()].slice(0,3),em=MOS[end.getMonth()].slice(0,3);
  const sy=start.getFullYear(),ey=end.getFullYear();
  if(sy===ey&&sm===em)return`${sm} ${start.getDate()}–${end.getDate()}, ${sy}`;
  if(sy===ey)return`${sm} ${start.getDate()} – ${em} ${end.getDate()}, ${sy}`;
  return`${sm} ${start.getDate()}, ${sy} – ${em} ${end.getDate()}, ${ey}`;
}
window.P2W=()=>{const s=getTwoWeekStart();s.setDate(s.getDate()-14);twoWeekStart=s;vY=s.getFullYear();vM=s.getMonth();render();};
window.N2W=()=>{const s=getTwoWeekStart();s.setDate(s.getDate()+14);twoWeekStart=s;vY=s.getFullYear();vM=s.getMonth();render();};
window.setCalView=v=>{
  calView=v;
  if(v==="2week"){
    // Snap 2-week window to contain the currently viewed month's first day, snapped to Sunday
    if(!twoWeekStart){const d=new Date(today);d.setDate(d.getDate()-d.getDay());d.setHours(0,0,0,0);twoWeekStart=d;}
    else{const d=new Date(twoWeekStart);vY=d.getFullYear();vM=d.getMonth();}
  }else{
    // Snap month view to the 2-week window's month when switching back
    if(twoWeekStart){const d=new Date(twoWeekStart);vY=d.getFullYear();vM=d.getMonth();}
  }
  render();
};

    </div>

    <div class="cal-wrap">
    <div class="cgrid flex-fill" style="--weeks:${weeks}">${DWS.map(d=>`<div class="dow">${d}</div>`).join("")}${days.map(({d,mine})=>{
      const k=dkf(d),de=eff[k]||[],isT=d.getTime()===today.getTime(),isPast=d<today&&!isT,inRun=isInRun(k)&&mine;
      const hasCook=de.some(e=>e.type==="cook");

      // Group by slot for display

const CAT_PALETTE=['#ae81ff','#66d9ef','#a6e22e','#fd971f','#f92672','#e6db74','#ff6eb4'];
function getCatColor(cat){if(!cat)return'var(--text3)';const idx=(S.eventCategories||[]).indexOf(cat);return idx<0?'var(--text3)':CAT_PALETTE[idx%CAT_PALETTE.length];}
function chip(e,k){
  const n=e.name||(e.id?R.find(x=>x.id===e.id)?.name:"");const short=n?n.length>24?n.slice(0,22)+"\u2026":n:"";
  const ts="min-width:0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap";
  const slotPrefix=e.slot&&e.slot!=="dinner"?`<span style="font-size:6px;text-transform:uppercase;opacity:.7;margin-right:2px;flex-shrink:0">${e.slot.charAt(0)}</span>`:"";
  if(e.type==="cook"){return`<div class="mc cook" onclick="event.stopPropagation();VR('${e.id}')" title="${n}">${slotPrefix}<span style="${ts}">${short}</span><span class="mx" onclick="event.stopPropagation();rmMeal('${k}','${e.slot}',${getMealIdx(k,e.slot,e)})">\u2715</span></div>`;}
  if(e.type==="leftover"){return`<div class="mc leftover" onclick="event.stopPropagation();VR('${e.id}')" title="${n} (leftover)">${slotPrefix}<span style="${ts}">${short} \u2606</span></div>`;}
  if(e.type==="quick"){return`<div class="mc quick" onclick="event.stopPropagation();rmMeal('${k}','${e.slot}',${getMealIdx(k,e.slot,e)})" title="${n}">${slotPrefix}<span style="${ts}">${short}</span><span class="mx">\u2715</span></div>`;}
  if(e.type==="eatout"){return`<div class="mc eatout" onclick="event.stopPropagation();rmMeal('${k}','${e.slot}',${getMealIdx(k,e.slot,e)})" title="${n}">${slotPrefix}<span style="${ts}">${short}</span><span class="mx">\u2715</span></div>`;}
  if(e.type==="recurring"){return`<div class="mc recurring">${slotPrefix}<span style="${ts}">${short}</span></div>`;}
  if(e.type==="run"){return`<div class="mc run" title="${e.name}"><span style="${ts}">${short}</span></div>`;}
  if(e.type==="run-actual"){return`<div class="mc run-actual" title="Actual: ${e.dist}mi"><span style="${ts}">${short}</span></div>`;}
  if(e.type==="run-ghost"){return`<div class="mc run-ghost" title="Planned: ${e.name}"><span style="${ts}">${short}</span></div>`;}
  if(e.type==="learn"){return`<div class="mc learn" title="${n}"><span style="${ts}">${short}</span></div>`;}
  if(e.type==="event"){const ei=S.events[k]?.findIndex(x=>x.title===(e.name||""))??-1;const catColor=getCatColor(e.category);return`<div class="mc event" style="border-left-color:${catColor}" onclick="event.stopPropagation();openEventEdit('${k}',${ei})" title="${n}${e.category?' ['+e.category+']':''} \u2014 click to edit"><span style="${ts}">${short}</span><span class="mx" onclick="event.stopPropagation();rmEvent('${k}',${ei})" title="Delete">\u2715</span></div>`;}
  if(e.type==="chore"){return`<div class="mc chore" draggable="true" ondragstart="choreDragStart('${e.templateId}','${e.originalDate}',event)" onclick="event.stopPropagation()" title="${n} \u2014 drag to reschedule${e.movedFrom?' (rescheduled)':''}"><span style="${ts}">${short}${e.movedFrom?' \u2195':''}</span></div>`;}
  if(e.type==="interaction"){return`<div class="mc interaction" onclick="event.stopPropagation();rmInteraction('${k}','${e.iid||""}')" title="${n.replace(/"/g,"&quot;")} (click to remove)"><span style="${ts}">${short}</span><span class="mx">\u2715</span></div>`;}
  if(e.type==="birthday"){return`<div class="mc birthday" onclick="event.stopPropagation();openPersonDetail('${e.personId}')" title="${n.replace(/"/g,"&quot;")}"><span style="${ts}">${short}</span></div>`;}
  return"";
}
function getMealIdx(dk,slot,entry){
  const meals=S.meals[dk]?.[slot]||[];
  return meals.findIndex(m=>m.type===entry.type&&(m.id||"")===(entry.id||"")&&(m.name||"")===(entry.name||""));
}

function renderPulse(stats,streak){
  const d=new Date(today),dow=d.getDay(),monOff=dow===0?-6:1-dow;
  const mon=new Date(d);mon.setDate(d.getDate()+monOff);
  let wC=0,wE=0,wPMi=0,wAMi=0,wLH=0;
  for(let i=0;i<7;i++){const wd=new Date(mon);wd.setDate(mon.getDate()+i);const k=dkf(wd);
    const dm=S.meals[k];if(dm)SLOTS.forEach(sl=>(dm[sl]||[]).forEach(e=>{if(e.type==="cook")wC++;if(e.type==="eatout")wE++;}));
    S.runDays.filter(r=>r.date===k).forEach(r=>wPMi+=r.dist);
    if(S.actualRuns[k])wAMi+=(S.actualRuns[k].dist||0);
    if(S.learnLog[k])(S.learnLog[k]).forEach(e=>wLH+=(e.hours||0));
  }

  // ────────── 30-day analytics ──────────
  // Build a 30-day window ending today
  const days30=[];
  for(let i=29;i>=0;i--){const dt=new Date(today);dt.setDate(today.getDate()-i);days30.push(dkf(dt));}

  // Top learning topics (by total hours, all-time)
  const topicHrs={};
  Object.values(S.learnLog).forEach(entries=>{if(Array.isArray(entries))entries.forEach(e=>{if(!e.topic)return;topicHrs[e.topic]=(topicHrs[e.topic]||0)+(e.hours||0);});});
  const topTopics=Object.entries(topicHrs).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const topTopicMax=topTopics.length?topTopics[0][1]:1;

  // Top cooked recipes (all-time)
  const cookCount={};
  Object.values(S.meals).forEach(slots=>{SLOTS.forEach(sl=>(slots[sl]||[]).forEach(e=>{if(e.type==="cook"&&e.id)cookCount[e.id]=(cookCount[e.id]||0)+1;}));});
  const topCooked=Object.entries(cookCount).map(([id,c])=>({id,c,name:R.find(x=>x.id===id)?.name||id})).sort((a,b)=>b.c-a.c).slice(0,6);
  const topCookMax=topCooked.length?topCooked[0].c:1;

  // Cuisine breakdown (all-time)
  const cuisineCount={};
  Object.values(S.meals).forEach(slots=>{SLOTS.forEach(sl=>(slots[sl]||[]).forEach(e=>{if(e.type==="cook"&&e.id){const r=R.find(x=>x.id===e.id);if(r){r.cu.forEach(c=>cuisineCount[c]=(cuisineCount[c]||0)+1);}}}));});
  const cuisines=Object.entries(cuisineCount).sort((a,b)=>b[1]-a[1]);
  const cuisineMax=cuisines.length?cuisines[0][1]:1;

  // 30-day learning heatmap (hours per day)
  const heatmap30=days30.map(dk=>{const entries=S.learnLog[dk]||[];return entries.reduce((s,e)=>s+(e.hours||0),0);});

  // 30-day running summary
  let run30Mi=0,run30Count=0,run30PaceSum=0,run30PaceCount=0;
  days30.forEach(dk=>{const a=S.actualRuns[dk];if(a&&a.dist){run30Mi+=a.dist;run30Count++;if(a.pace){run30PaceSum+=a.pace;run30PaceCount++;}}});
  const run30AvgPace=run30PaceCount?run30PaceSum/run30PaceCount:0;

  // 12-week cooking trend (weeks ending last 12 Sundays up to this week)
  const weeks12=[];
  for(let w=11;w>=0;w--){
    const ws=new Date(mon);ws.setDate(mon.getDate()-w*7);
    let c=0;
    for(let i=0;i<7;i++){const wd=new Date(ws);wd.setDate(ws.getDate()+i);const k=dkf(wd);
      const dm=S.meals[k];if(dm)SLOTS.forEach(sl=>(dm[sl]||[]).forEach(e=>{if(e.type==="cook")c++;}));
    }
    weeks12.push(c);
  }
  const weeks12Max=Math.max(1,...weeks12);

  // 12-week learning hours trend
  const learnWeeks12=[];
  for(let w=11;w>=0;w--){
    const ws=new Date(mon);ws.setDate(mon.getDate()-w*7);
    let h=0;
    for(let i=0;i<7;i++){const wd=new Date(ws);wd.setDate(ws.getDate()+i);const k=dkf(wd);
      if(S.learnLog[k])(S.learnLog[k]).forEach(e=>h+=(e.hours||0));
    }
    learnWeeks12.push(Math.round(h*10)/10);
  }
  const learnWeeks12Max=Math.max(1,...learnWeeks12);

  // Heatmap bucketing for learning hours: 0, 0-1, 1-2, 2-3, 3+
  function heatLevel(h){if(h<=0)return"";if(h<1)return"l1";if(h<2)return"l2";if(h<3)return"l3";return"l4";}

  // Days active (last 30): meals cooked, workouts logged, learning logged
  let activeMealDays=0,activeRunDays=0,activeLearnDays=0;
  days30.forEach(dk=>{
    const slots=S.meals[dk];if(slots&&SLOTS.some(sl=>(slots[sl]||[]).some(e=>e.type==="cook")))activeMealDays++;
    if(S.actualRuns[dk]&&S.actualRuns[dk].dist)activeRunDays++;
    if(S.learnLog[dk]&&S.learnLog[dk].length)activeLearnDays++;
  });

  return`<div style="font-size:16px;font-weight:600;margin-bottom:12px">Pulse</div>

    <div class="lbl">This week \u00b7 ${fmtDate(dkf(mon))} \u2013 ${fmtDate(dkf(new Date(mon.getFullYear(),mon.getMonth(),mon.getDate()+6)))}</div>
    <div class="pulse">
      <div class="pulse-card"><div class="pulse-val">${wC}</div><div class="pulse-label">Cooked</div></div>
      <div class="pulse-card"><div class="pulse-val">${wE}</div><div class="pulse-label">Ate out</div></div>
      <div class="pulse-card"><div class="pulse-val">${Math.round(wAMi*10)/10}<span style="font-size:12px;color:var(--text3)"> / ${Math.round(wPMi*10)/10}</span></div><div class="pulse-label">Miles (act/plan)</div></div>
      <div class="pulse-card"><div class="pulse-val">${Math.round(wLH*100)/100}</div><div class="pulse-label">Learn hrs</div></div>
      <div class="pulse-card"><div class="pulse-val">${streak}</div><div class="pulse-label">Streak</div></div>
    </div>

    <div class="lbl" style="margin-top:14px">Monthly (${MOS[vM]} ${vY})</div>
    <div class="pulse">
      <div class="pulse-card"><div class="pulse-val">${stats.cook}</div><div class="pulse-label">Cooked</div></div>
      <div class="pulse-card"><div class="pulse-val">${stats.eatout}</div><div class="pulse-label">Ate out</div></div>
      <div class="pulse-card"><div class="pulse-val">${stats.aMi}<span style="font-size:12px;color:var(--text3)"> / ${stats.pMi}</span></div><div class="pulse-label">Miles (act/plan)</div></div>
      <div class="pulse-card"><div class="pulse-val">${stats.lHrs}</div><div class="pulse-label">Learn hrs</div></div>
    </div>

    <div class="an-section" style="margin-top:22px">
      <div class="an-hdr">Last 30 days</div>
      <div class="pulse">
        <div class="pulse-card"><div class="pulse-val">${activeMealDays}<span style="font-size:12px;color:var(--text3)">/30</span></div><div class="pulse-label">Cook days</div></div>
        <div class="pulse-card"><div class="pulse-val">${activeRunDays}<span style="font-size:12px;color:var(--text3)">/30</span></div><div class="pulse-label">Run days</div></div>
        <div class="pulse-card"><div class="pulse-val">${activeLearnDays}<span style="font-size:12px;color:var(--text3)">/30</span></div><div class="pulse-label">Learn days</div></div>
        <div class="pulse-card"><div class="pulse-val">${Math.round(run30Mi*10)/10}</div><div class="pulse-label">Miles (30d)</div></div>
        <div class="pulse-card"><div class="pulse-val">${run30AvgPace?fmtPace(run30AvgPace):"\u2014"}</div><div class="pulse-label">Avg pace (30d)</div></div>
      </div>
    </div>

    <div class="an-section">
      <div class="an-hdr">Learning heatmap \u00b7 last 30 days</div>
      <div class="an-grid" style="grid-template-columns:repeat(${Math.min(15,days30.length)},1fr);gap:3px">
        ${heatmap30.map((h,i)=>`<div class="an-cell ${heatLevel(h)}" title="${days30[i]}: ${Math.round(h*100)/100}h"></div>`).join("")}
      </div>
      <div style="display:flex;align-items:center;gap:4px;margin-top:6px;font-size:9px;color:var(--text3)">
        <span>Less</span>
        <span class="an-cell" style="width:10px;height:10px"></span>
        <span class="an-cell l1" style="width:10px;height:10px"></span>
        <span class="an-cell l2" style="width:10px;height:10px"></span>
        <span class="an-cell l3" style="width:10px;height:10px"></span>
        <span class="an-cell l4" style="width:10px;height:10px"></span>
        <span>More</span>
      </div>
    </div>

    ${topTopics.length?`<div class="an-section">
      <div class="an-hdr">Top learning topics \u00b7 all time</div>
      ${topTopics.map(([t,h])=>{const pct=Math.round((h/topTopicMax)*100);return`<div class="an-row"><span class="an-row-lbl">${t}</span><div class="an-bar-wrap"><div class="an-bar" style="width:${pct}%;background:var(--purple-t)"></div></div><span class="an-row-val">${Math.round(h*10)/10}h</span></div>`;}).join("")}
    </div>`:""}

    ${topCooked.length?`<div class="an-section">
      <div class="an-hdr">Top cooked recipes</div>
      ${topCooked.map(r=>{const pct=Math.round((r.c/topCookMax)*100);return`<div class="an-row"><span class="an-row-lbl">${r.name}</span><div class="an-bar-wrap"><div class="an-bar" style="width:${pct}%;background:var(--blue)"></div></div><span class="an-row-val">${r.c}\u00d7</span></div>`;}).join("")}
    </div>`:""}

    ${cuisines.length?`<div class="an-section">
      <div class="an-hdr">Cuisine mix</div>
      ${cuisines.map(([c,n])=>{const pct=Math.round((n/cuisineMax)*100);const col=CCOL[c]||{bg:"var(--bg4)",c:"var(--text2)"};return`<div class="an-row"><span class="an-row-lbl"><span class="tag" style="background:${col.bg};color:${col.c};font-size:9px">${c}</span></span><div class="an-bar-wrap"><div class="an-bar" style="width:${pct}%;background:${col.c}"></div></div><span class="an-row-val">${n}\u00d7</span></div>`;}).join("")}
    </div>`:""}

    <div class="an-section">
      <div class="an-hdr">Weekly cook count \u00b7 last 12 weeks</div>
      <div class="an-spark">${weeks12.map((c,i)=>`<div class="an-spark-bar${c===0?" miss":""}" style="height:${Math.max(2,Math.round((c/weeks12Max)*100))}%" title="Week ${i-11===0?'(this week)':(i-11)}: ${c} cooked"></div>`).join("")}</div>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:2px"><span>12 wks ago</span><span>This week</span></div>
    </div>

    <div class="an-section">
      <div class="an-hdr">Weekly learning hours \u00b7 last 12 weeks</div>
      <div class="an-spark">${learnWeeks12.map((h,i)=>`<div class="an-spark-bar${h===0?" miss":""}" style="height:${Math.max(2,Math.round((h/learnWeeks12Max)*100))}%;background:var(--purple-t)" title="Week ${i-11===0?'(this week)':(i-11)}: ${h}h"></div>`).join("")}</div>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:2px"><span>12 wks ago</span><span>This week</span></div>
    </div>
  `;
}

function renderEventEditModal(){
  const ev=S.events[eventEditDk]?.[eventEditIdx];
  if(!ev)return'';
  const safeTitle=(ev.title||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  const safeNotes=(ev.notes||'').replace(/</g,'&lt;');
  return`<div class="ov" onclick="closeEventEdit()">
    <div class="mdl" onclick="event.stopPropagation()" style="max-width:400px">
      <div class="mdl-t">✎ Event — ${fmtDate(eventEditDk)}</div>
      <div class="lbl" style="margin-top:8px">Name</div>
      <input class="sinp" id="ee-title" value="${safeTitle}" placeholder="Event name" style="font-size:14px">
      <div class="lbl">Time <span style="font-weight:400;color:var(--text3)">(optional)</span></div>
      <input class="sinp" id="ee-time" type="time" value="${ev.time||''}">
      <div class="lbl">Category <span style="font-weight:400;color:var(--text3)">(optional)</span></div>
      <select class="sinp" id="ee-cat">
        <option value="">(no category)</option>
        ${(S.eventCategories||[]).map(c=>`<option value="${c.replace(/"/g,'&quot;')}"${ev.category===c?' selected':''}>${c}</option>`).join("")}
      </select>
      <div class="lbl">Notes <span style="font-weight:400;color:var(--text3)">(optional)</span></div>
      <textarea class="sinp" id="ee-notes" rows="3" style="resize:vertical;line-height:1.5">${safeNotes}</textarea>
      <div class="mft">
        <button class="bc" onclick="deleteEventFromEdit()" style="color:var(--coral-t);border-color:var(--coral-t);margin-right:auto">Delete</button>
        <button class="bc" onclick="closeEventEdit()">Cancel</button>
        <button class="ba" onclick="saveEventEdit()">Save</button>
      </div>
    </div>
  </div>`;
}
window.openEventEdit=(dk,idx)=>{if(idx<0)return;eventEditModal=true;eventEditDk=dk;eventEditIdx=idx;render();};
window.closeEventEdit=()=>{eventEditModal=false;render();};
window.saveEventEdit=()=>{
  const ev=S.events[eventEditDk]?.[eventEditIdx];if(!ev)return;
  const t=document.getElementById('ee-title')?.value?.trim();
  if(!t)return;
  const tm=document.getElementById('ee-time')?.value;
  const n=document.getElementById('ee-notes')?.value?.trim();
  const cat=document.getElementById('ee-cat')?.value;
  ev.title=t;
  if(tm)ev.time=tm;else delete ev.time;
  if(n)ev.notes=n;else delete ev.notes;
  if(cat)ev.category=cat;else delete ev.category;
  save();eventEditModal=false;render();
};
window.deleteEventFromEdit=()=>{
  if(!S.events[eventEditDk])return;
  S.events[eventEditDk].splice(eventEditIdx,1);
  if(!S.events[eventEditDk].length)delete S.events[eventEditDk];
  save();eventEditModal=false;render();
};

// ─── Trips ───
window.addTrip=()=>{
  const name=document.getElementById('trip-name')?.value?.trim();
  const start=document.getElementById('trip-start')?.value;
  const end=document.getElementById('trip-end')?.value;
  if(!name||!start||!end||start>end){alert('Please fill in a name, start, and end date (start must be before end).');return;}
  if(!S.trips)S.trips=[];
  S.trips.push({id:genId('tr'),name,start,end});
  save();render();
};
window.rmTrip=id=>{
  if(!S.trips)return;
  S.trips=S.trips.filter(t=>t.id!==id);
  save();render();
};

function choreIsDone(id,cadence){
  const last=(S.choreLog||{})[id];
  if(!last)return false;
  const lastD=parsedk(last);
  if(cadence==="daily")return last===dkf(today);
  if(cadence==="weekly"){
    const dow=today.getDay();
    const weekStart=new Date(today);weekStart.setDate(today.getDate()-dow);weekStart.setHours(0,0,0,0);
    return lastD>=weekStart;
  }
  if(cadence==="monthly")return lastD.getFullYear()===today.getFullYear()&&lastD.getMonth()===today.getMonth();
  if(cadence==="quarterly"){const diff=Math.floor((today-lastD)/864e5);return diff<=90;}
  return false;
}
window.toggleChore=(id,cadence)=>{
  if(!S.choreLog)S.choreLog={};
  if(choreIsDone(id,cadence)){delete S.choreLog[id];}
  else{S.choreLog[id]=dkf(today);}
  sv();
};
window.addChore=(cadence)=>{
  const inp=document.getElementById("new-chore-"+cadence);
  if(!inp||!inp.value.trim())return;
  const label=inp.value.trim();
  const id="ch_"+cadence[0]+Date.now().toString(36);
  if(!S.choreItems)S.choreItems={daily:[],weekly:[],monthly:[],quarterly:[]};
  (S.choreItems[cadence]||(S.choreItems[cadence]=[])).push({id,label});
  inp.value="";
  sv();
};
window.removeChore=(id,cadence)=>{
  if(!S.choreItems)return;
  S.choreItems[cadence]=(S.choreItems[cadence]||[]).filter(c=>c.id!==id);
  if(S.choreLog)delete S.choreLog[id];
  sv();
};
