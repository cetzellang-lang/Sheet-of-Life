const TIERS=[
  {k:"family",l:"Family",cls:"tier-family"},
  {k:"close",l:"Close friend",cls:"tier-close"},
  {k:"friend",l:"Friend",cls:"tier-friend"},
  {k:"pro",l:"Professional",cls:"tier-pro"},
  {k:"acq",l:"Acquaintance",cls:"tier-acq"}
];
function tierInfo(k){return TIERS.find(t=>t.k===k);}
function personInitials(name){
  if(!name)return"?";
  const parts=name.trim().split(/\s+/);
  if(parts.length===1)return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}
// Last interaction date for a person, or null
function lastContactDate(personId){
  let latest=null;
  Object.entries(S.interactions||{}).forEach(([dk,list])=>{
    if(!Array.isArray(list))return;
    list.forEach(iv=>{if((iv.personIds||[]).includes(personId)){if(!latest||dk>latest)latest=dk;}});
  });
  return latest;
}
function daysSinceStr(dk){
  if(!dk)return"never";
  const d=parsedk(dk);
  const diff=Math.floor((today-d)/864e5);
  if(diff===0)return"today";
  if(diff===1)return"1 day ago";
  return diff+" days ago";
}
function cadenceStatus(person){
  if(!person.cadenceDays)return null; // no cadence set
  const last=lastContactDate(person.id);
  if(!last)return{status:"never",days:null};
  const d=parsedk(last);
  const diff=Math.floor((today-d)/864e5);
  if(diff<=person.cadenceDays)return{status:"on-track",days:diff};
  if(diff<=person.cadenceDays*2)return{status:"due",days:diff};
  return{status:"overdue",days:diff};
}
function interactionsFor(personId){
  const result=[];
  Object.entries(S.interactions||{}).forEach(([dk,list])=>{
    if(!Array.isArray(list))return;
    list.forEach(iv=>{if((iv.personIds||[]).includes(personId))result.push({...iv,date:dk});});
  });
  result.sort((a,b)=>b.date.localeCompare(a.date));
  return result;
}
function genId(prefix){return prefix+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,6);}

function renderPeopleList(){
  const peopleArr=Object.values(S.people||{});
  const q=(peopleSearch||"").toLowerCase();
  const filtered=peopleArr.filter(p=>{
    if(peopleFilter!=="all"&&p.tier!==peopleFilter)return false;
    if(q&&!p.name.toLowerCase().includes(q))return false;
    return true;
  });
  // Sort: overdue first, then due, then by last-contact ascending (oldest first), then alpha
  filtered.sort((a,b)=>{
    const ca=cadenceStatus(a),cb=cadenceStatus(b);
    const rank=s=>s?{overdue:0,due:1,"on-track":2,never:3}[s.status]??4:4;
    const r=rank(ca)-rank(cb);
    if(r!==0)return r;
    const la=lastContactDate(a.id),lb=lastContactDate(b.id);
    if(la&&lb)return la.localeCompare(lb);
    if(!la&&lb)return 1;
    if(la&&!lb)return -1;
    return a.name.localeCompare(b.name);
  });

  const tierCounts={};
  peopleArr.forEach(p=>{if(p.tier)tierCounts[p.tier]=(tierCounts[p.tier]||0)+1;});

  return`<div class="ppl-hdr">
    <span class="ppl-title">People</span>
    <button class="ba" onclick="openPersonEdit(null)">+ New person</button>
    <button class="tb" onclick="openLogInteraction()">+ Log interaction</button>

    <button class="fb${peopleFilter==="all"?" on":""}" onclick="setPeopleFilter('all')">All (${peopleArr.length})</button>

  </div>
  ${filtered.length===0?`<div class="ppl-empty">${peopleArr.length===0?"No people yet. Click \u201c+ New person\u201d to start.":"No people match your filter."}</div>`:filtered.map(p=>{
    const last=lastContactDate(p.id);
    const cad=cadenceStatus(p);
    const sinceCls=cad?cad.status:"";
    const sinceTxt=last?daysSinceStr(last):"never logged";
    const tier=tierInfo(p.tier);
    return`<div class="ppl-row" onclick="openPersonDetail('${p.id}')">
      <div class="ppl-avatar">${personInitials(p.name)}</div>
      <div class="ppl-info">
        <div class="ppl-name">${p.name}</div>
        <div class="ppl-meta">
          ${tier?`<span class="tier-badge ${tier.cls}">${tier.l}</span>`:""}
          ${p.cadenceDays?`<span style="color:var(--text3)">every ${p.cadenceDays}d</span>`:""}
        </div>
      </div>
      <div class="ppl-since ${sinceCls}">${sinceTxt}</div>
      <div style="color:var(--text3);font-size:14px">\u203a</div>
    </div>`;
  }).join("")}`;
}

  </div>`).join("")}
  <div style="margin-top:20px;padding-top:14px;border-top:0.5px solid var(--border)">
    <button class="dbtn" onclick="if(confirm('Delete ${p.name.replace(/'/g,"\\'")} and all their interactions?')){deletePerson('${p.id}')}">Delete person</button>
  </div>`;
}

function fmtBirthday(s){
  // "MM-DD" or "YYYY-MM-DD"
  const parts=s.split("-");

}

// v0.7: Day edit modal — for retroactively editing any day (past, today, future)
function renderDayEditModal(){

  const dayLearn=S.learnLog[dk]||[];
  const dayRun=S.actualRuns[dk];
  const plannedRun=S.runDays.find(r=>r.date===dk);
  const dayInteractions=(S.interactions&&S.interactions[dk])||[];
  const d=parsedk(dk);
  const dateLabel=DWS[d.getDay()]+", "+MOS[d.getMonth()]+" "+d.getDate()+", "+d.getFullYear();

  // Build meal list with slot info
  const mealItems=[];
  SLOTS.forEach(sl=>{(dayMeals[sl]||[]).forEach((e,idx)=>{
    let lbl="";

    mealItems.push({slot:sl,idx,type:e.type,lbl});
  });});

  return`<div class="ov" onclick="closeDayEdit()"><div class="mdl mdl-day" onclick="event.stopPropagation()">

    <div class="de-section">
      <div class="de-section-hdr"><span class="de-section-title">Meals</span><button class="de-add-btn" onclick="openAddFromDayEdit('meal')">+ Add meal</button></div>
      ${mealItems.length?mealItems.map(m=>`<div class="de-item"><span class="de-item-slot">${m.slot.charAt(0).toUpperCase()}</span><span class="de-item-lbl">${m.lbl||"(empty)"}</span><span class="de-item-meta">${m.type}</span><span class="de-item-rm" onclick="deRmMeal('${dk}','${m.slot}',${m.idx})" title="Remove">\u2715</span></div>`).join(""):`<div class="de-empty">No meals logged.</div>`}
    </div>

      <div class="de-section-hdr"><span class="de-section-title">Events</span><button class="de-add-btn" onclick="openAddFromDayEdit('event')">+ Add event</button></div>
      ${dayEvents.length?dayEvents.map((e,i)=>`<div class="de-item"><span class="de-item-lbl">${e.title}${e.time?" \u2014 "+e.time:""}</span><span class="de-item-meta">${e.notes||""}</span><span class="de-item-rm" onclick="deRmEvent('${dk}',${i})">\u2715</span></div>`).join(""):`<div class="de-empty">No events.</div>`}
    </div>

    <div class="de-section">
      <div class="de-section-hdr"><span class="de-section-title">Learning</span><button class="de-add-btn" onclick="openAddFromDayEdit('learn')">+ Log session</button></div>

    </div>

    <div class="de-section">
      <div class="de-section-hdr"><span class="de-section-title">Interactions</span><button class="de-add-btn" onclick="openLogInteractionFromDayEdit('${dk}')">+ Log interaction</button></div>
      ${dayInteractions.length?dayInteractions.map(iv=>{
        const names=(iv.personIds||[]).map(pid=>S.people?.[pid]?.name||"?").join(", ");
        return `<div class="de-item"><span class="de-item-lbl"><strong>${names||"(unknown)"}</strong>${iv.notes?" \u2014 "+iv.notes:""}</span><span class="de-item-meta">${iv.type||""}</span><span class="de-item-rm" onclick="rmInteraction('${dk}','${iv.id}')">\u2715</span></div>`;
      }).join(""):`<div class="de-empty">No interactions logged.</div>`}

      ${dayRun?`<div class="de-item"><span class="de-item-slot" style="color:var(--teal-t)">A</span><span class="de-item-lbl">Actual: ${dayRun.dist}mi${dayRun.pace?" @ "+fmtPace(dayRun.pace)+"/mi":""}</span><span class="de-item-meta">${dayRun.notes||""}</span><span class="de-item-rm" onclick="deRmRun('${dk}')">\u2715</span></div>`:""}
      <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:end;margin-top:4px">
        <div class="run-field"><label>Miles</label><input type="number" id="de-run-dist" step="0.1" value="${dayRun?dayRun.dist:""}" style="width:60px"></div>
        <div class="run-field"><label>Pace</label><input type="text" id="de-run-pace" placeholder="MM:SS" value="${dayRun&&dayRun.pace?fmtPace(dayRun.pace):""}" style="width:60px"></div>
        <div class="run-field"><label>Notes</label><input type="text" id="de-run-notes" value="${dayRun?(dayRun.notes||"").replace(/"/g,"&quot;"):""}" style="width:110px"></div>
        <button class="tb" onclick="deLogRun('${dk}')">${dayRun?"Update":"Log"}</button>

    <div class="mft"><button class="bc" onclick="closeDayEdit()">Close</button></div>

function sv(){save();render();}
// Save without scroll jump — for actions within scrollable content
function svKeepScroll(){
  save();
  const cnt=document.querySelector('.cnt');
  const scrollTop=cnt?cnt.scrollTop:0;
  render();
  requestAnimationFrame(()=>{const cnt2=document.querySelector('.cnt');if(cnt2)cnt2.scrollTop=scrollTop;});
}
window.ST=t=>{tab=t;render();};window.SF=f=>{fc=f;render();};window.SQ=v=>{q=v;render();};
window.SR=id=>{sel=sel===id?null:id;render();};
window.PM=()=>{if(vM===0){vM=11;vY--;}else vM--;render();};
window.NM=()=>{const max=new Date(today.getFullYear(),today.getMonth()+30,1);if(new Date(vY,vM+1,1)<=max){if(vM===11){vM=0;vY++;}else vM++;}render();};
window.TFS=v=>{if(v){S.activeRun.start=v;sv();}};
window.TFE=v=>{if(v){S.activeRun.end=v;sv();}};
window.toggleSide=()=>{sideCollapsed=!sideCollapsed;render();};

window.OM=date=>{modal=true;mdate=date;mpick=sel||null;modalTab="recipe";modalSlot="dinner";render();};
window.CM=()=>{modal=false;mpick=null;render();};
window.MP=id=>{mpick=id;render();};
window.setMT=t=>{modalTab=t;mpick=null;render();};
window.setSlot=s=>{modalSlot=s;render();};

// Meals
window.addCook=()=>{if(!mpick||!mdate)return;ensureDay(mdate);S.meals[mdate][modalSlot].push({type:"cook",id:mpick});modal=false;mpick=null;sv();};
window.addQuick=()=>{if(!mpick||!mpick.startsWith("qm:")||!mdate)return;ensureDay(mdate);S.meals[mdate][modalSlot].push({type:"quick",name:mpick.slice(3)});modal=false;mpick=null;sv();};
window.addEO=()=>{if(!mdate)return;ensureDay(mdate);const lb=(document.getElementById("eo-label")?.value.trim())||"Eat out";S.meals[mdate][modalSlot].push({type:"eatout",name:lb});modal=false;sv();};
window.rmMeal=(dk,slot,idx)=>{if(S.meals[dk]?.[slot]&&idx>=0){S.meals[dk][slot].splice(idx,1);}sv();};
window.addQMModal=()=>{const inp=document.getElementById("mq-new");if(!inp||!inp.value.trim())return;const n=inp.value.trim();if(!S.quickMeals.includes(n))S.quickMeals.push(n);mpick="qm:"+n;save();render();};
window.addQMI=()=>{const inp=document.getElementById("newqm");if(!inp||!inp.value.trim())return;if(!S.quickMeals.includes(inp.value.trim()))S.quickMeals.push(inp.value.trim());sv();};
window.delQM=i=>{S.quickMeals.splice(i,1);sv();};

// Events
window.addEvent=()=>{if(!mdate)return;const t=document.getElementById("ev-title")?.value.trim();if(!t)return;const time=document.getElementById("ev-time")?.value.trim()||"";const notes=document.getElementById("ev-notes")?.value.trim()||"";const category=document.getElementById("ev-cat")?.value.trim()||"";const ev={title:t,time,notes};if(category)ev.category=category;(S.events[mdate]||(S.events[mdate]=[])).push(ev);modal=false;sv();};
window.rmEvent=(dk,idx)=>{if(S.events[dk]&&idx>=0){S.events[dk].splice(idx,1);if(!S.events[dk].length)delete S.events[dk];}sv();};
// Modal primary selection (slot-first flow)
window.setPrimary=p=>{if(p==="event"||p==="learn"){modalTab=p;}else{modalSlot=p;if(!["recipe","quick","eatout"].includes(modalTab))modalTab="recipe";}mpick=null;render();};
// Event categories
window.addEventCategory=()=>{const inp=document.getElementById("newcat");if(!inp||!inp.value.trim())return;const c=inp.value.trim();if(!S.eventCategories)S.eventCategories=[];if(!S.eventCategories.includes(c))S.eventCategories.push(c);inp.value="";sv();};
window.removeEventCategory=cat=>{S.eventCategories=(S.eventCategories||[]).filter(c=>c!==cat);sv();};
// Chore templates
window.addChoreTemplate=()=>{const inp=document.getElementById("ct-name");const sel=document.getElementById("ct-dow");if(!inp||!inp.value.trim()||!sel)return;const name=inp.value.trim();const dow=parseInt(sel.value,10);if(!S.choreTemplates)S.choreTemplates=[];S.choreTemplates.push({id:genId("ct"),name,dow});inp.value="";sv();};
window.removeChoreTemplate=id=>{S.choreTemplates=(S.choreTemplates||[]).filter(t=>t.id!==id);S.choreOverrides=(S.choreOverrides||[]).filter(o=>o.templateId!==id);sv();};
window.choreDragStart=(templateId,originalDate,ev)=>{dragChoreData={templateId,originalDate};ev.dataTransfer.effectAllowed="move";ev.stopPropagation();};
window.choreDropOnDay=(targetDate,ev)=>{ev.preventDefault();ev.stopPropagation();if(!dragChoreData)return;const{templateId,originalDate}=dragChoreData;dragChoreData=null;if(targetDate===originalDate)return;if(!S.choreOverrides)S.choreOverrides=[];const idx=S.choreOverrides.findIndex(o=>o.templateId===templateId&&o.originalDate===originalDate);if(idx>=0)S.choreOverrides[idx].movedTo=targetDate;else S.choreOverrides.push({templateId,originalDate,movedTo:targetDate});sv();};

// Recurring
window.toggleRec=day=>{const idx=S.recurringEatout.indexOf(day);if(idx>=0)S.recurringEatout.splice(idx,1);else S.recurringEatout.push(day);sv();};

// Shopping
window.toggleChk=k=>{S.activeRun.chk[k]=!S.activeRun.chk[k];svKeepScroll();};
window.clearChk=()=>{S.activeRun.chk={};svKeepScroll();};
window.toggleHideChecked=()=>{hideChecked=!hideChecked;svKeepScroll();};
window.archiveRun=()=>{const ids=getRunCookIds();if(!ids.length)return;
  S.shopArchive.push({start:S.activeRun.start,end:S.activeRun.end,recipes:ids,purchased:{...S.activeRun.chk},closedAt:dkf(today)});
  const next=new Date(S.activeRun.end+"T12:00:00");next.setDate(next.getDate()+1);
  S.activeRun={start:dkf(next),end:dkf(new Date(next.getFullYear(),next.getMonth(),next.getDate()+13)),chk:{}};sv();};
window.exportShopICS=()=>{const ids=getRunCookIds();const evts=[];const seen=new Set();ids.forEach(id=>{if(seen.has(id))return;seen.add(id);const r=R.find(x=>x.id===id);if(!r)return;const dk=Object.entries(S.meals).find(([k,sl])=>isInRun(k)&&SLOTS.some(s=>(sl[s]||[]).some(e=>e.id===id)));if(dk)evts.push({title:"Meal Prep: "+r.name,date:dk[0],dur:60,desc:r.inst.join("\n")});});if(evts.length)dlICS("sol_mealprep.ics",makeBatchICS(evts));};

// Running
window.setRP=(k,v)=>{S.runPlan[k]=v;sv();};
window.genPlan=()=>{if(!S.runPlan.raceDate)return alert("Set a race date");S.runDays=generateRunPlan(S.runPlan.raceDate,S.runPlan.distance,S.runPlan.goalTime,S.runPlan.level);sv();};
window.logRun=()=>{const dk=document.getElementById("ar-date")?.value;const dist=+(document.getElementById("ar-dist")?.value)||0;const pace=parsePace(document.getElementById("ar-pace")?.value||"");const notes=document.getElementById("ar-notes")?.value?.trim()||"";if(!dk||!dist)return;S.actualRuns[dk]={dist:Math.round(dist*100)/100,pace:pace?Math.round(pace*100)/100:null,notes};sv();};
window.expRun=i=>{const r=S.runDays[i];if(!r)return;dlICS(r.type.replace(/\s/g,"_")+"_"+r.date+".ics",makeICS(r.type+" - "+r.dist+"mi",r.date,Math.round(r.dist*r.pace),r.phase+" | "+fmtPace(r.pace)+"/mi"));};
window.batchRunICS=()=>{dlICS("sol_run_plan.ics",makeBatchICS(S.runDays.map(r=>({title:r.type+" - "+r.dist+"mi",date:r.date,dur:Math.round(r.dist*r.pace),desc:r.phase+" | "+fmtPace(r.pace)+"/mi"}))));};
window.expMealICS=id=>{const r=R.find(x=>x.id===id);if(!r)return;dlICS("mealprep_"+r.id+".ics",makeICS("Meal Prep: "+r.name,dkf(today),60,r.inst.join("\n")));};

// Learning — multi-entry per day, v0.7: date-aware + topic dropdown
window.logLearn=()=>{
  const sel=document.getElementById("learn-topic-sel");
  let t="";
  if(sel){
    if(sel.value==="__new__"){t=document.getElementById("learn-topic-new")?.value.trim()||"";}
    else{t=sel.value;}
  }
  if(!t)return;
  const dk=document.getElementById("learn-date")?.value||dkf(today);
  const hrs=Math.round((+(document.getElementById("learn-hrs")?.value)||0)*100)/100;
  const notes=document.getElementById("learn-notes")?.value?.trim()||"";
  if(!S.learnLog[dk])S.learnLog[dk]=[];
  S.learnLog[dk].push({topic:t,hours:hrs,notes});
  // If topic is new, add it to learnTopics list so it shows up in future dropdowns
  if(!S.learnTopics.includes(t))S.learnTopics.push(t);
  sv();
};

window.onLearnTopicChange=v=>{
  const inp=document.getElementById("learn-topic-new");

  else{inp.style.display="none";inp.value="";}

window.logLearnModal=()=>{

};
window.rmLearn=(dk,idx)=>{if(S.learnLog[dk]){S.learnLog[dk].splice(idx,1);if(!S.learnLog[dk].length)delete S.learnLog[dk];}sv();};
// v0.7: Topics (renamed from queue)
window.addLT=()=>{const inp=document.getElementById("learn-topic-new-queue");if(!inp||!inp.value.trim())return;const v=inp.value.trim();if(!S.learnTopics.includes(v))S.learnTopics.push(v);sv();};
window.delLT=i=>{S.learnTopics.splice(i,1);sv();};
// Back-compat: keep the old learn-modal (in the big Add modal) if someone uses it
window.addLQ=()=>{const inp=document.getElementById("learn-new");if(!inp||!inp.value.trim())return;if(!S.learnTopics.includes(inp.value.trim()))S.learnTopics.push(inp.value.trim());sv();};
window.delLQ=i=>{S.learnTopics.splice(i,1);sv();};
// v0.7: expand/collapse recent log rows
window.toggleLearnExp=dk=>{expandedLearnDate=expandedLearnDate===dk?null:dk;render();};

// Goals — per month
window.updGoal=(i,k,v)=>{const goals=getGoals(vY,vM);goals[i][k]=v;setGoals(vY,vM,goals);render();};

// Pantry
window.rmPantry=i=>{S.pantryProfile.splice(i,1);sv();};
window.addPantry=()=>{const inp=document.getElementById("newpantry");if(!inp||!inp.value.trim())return;const n=norm(inp.value.trim());if(!S.pantryProfile.includes(n))S.pantryProfile.push(n);sv();};

// ═══════════════════════════════════════
// v0.7: DAY EDIT (retroactive editing)
// ═══════════════════════════════════════
window.EDITDAY=dk=>{dayEdit=true;dayEditDate=dk;render();};
window.closeDayEdit=()=>{dayEdit=false;dayEditDate=null;render();};
window.deRmMeal=(dk,slot,idx)=>{if(S.meals[dk]?.[slot]&&idx>=0){S.meals[dk][slot].splice(idx,1);}sv();};
window.deRmEvent=(dk,idx)=>{if(S.events[dk]&&idx>=0){S.events[dk].splice(idx,1);if(!S.events[dk].length)delete S.events[dk];}sv();};
window.deRmLearn=(dk,idx)=>{if(S.learnLog[dk]){S.learnLog[dk].splice(idx,1);if(!S.learnLog[dk].length)delete S.learnLog[dk];}sv();};
window.deRmRun=dk=>{delete S.actualRuns[dk];sv();};
window.deLogRun=dk=>{
  const dist=+(document.getElementById("de-run-dist")?.value)||0;
  const pace=parsePace(document.getElementById("de-run-pace")?.value||"");
  const notes=document.getElementById("de-run-notes")?.value?.trim()||"";
  if(!dist){delete S.actualRuns[dk];sv();return;}
  S.actualRuns[dk]={dist:Math.round(dist*100)/100,pace:pace?Math.round(pace*100)/100:null,notes};
  sv();
};
// Open the Add modal from within the day-edit modal, seeded to that date
window.openAddFromDayEdit=which=>{
  const dk=dayEditDate;if(!dk)return;
  dayEdit=false;
  modal=true;mdate=dk;mpick=sel||null;
  modalTab=which==="event"?"event":which==="learn"?"learn":"recipe";
  modalSlot="dinner";
  render();
};

// ═══════════════════════════════════════
// v0.8: PEOPLE ACTIONS
// ═══════════════════════════════════════
window.setPeopleSearch=v=>{peopleSearch=v;render();};
window.setPeopleFilter=f=>{peopleFilter=f;render();};
window.openPersonDetail=pid=>{
  if(!S.people[pid])return;
  selectedPersonId=pid;peopleView="detail";
  if(tab!=="people")tab="people";
  render();
};
window.backToPeopleList=()=>{peopleView="list";selectedPersonId=null;render();};
window.openPersonEdit=pid=>{
  if(pid&&S.people[pid])personEditDraft={...S.people[pid]};
  else personEditDraft={id:null,name:"",tier:"",birthday:"",cadenceDays:"",notes:""};
  peopleView="edit";
  if(tab!=="people")tab="people";
  render();
};
window.cancelPersonEdit=()=>{
  personEditDraft=null;
  peopleView=selectedPersonId?"detail":"list";
  render();
};
window.clearPersonField=field=>{
  if(!personEditDraft)return;
  // Pull current form state first so user-typed values aren't lost
  collectPersonEditForm();
  personEditDraft[field]="";
  render();
};
function collectPersonEditForm(){
  if(!personEditDraft)return;
  const n=document.getElementById("pf-name");if(n)personEditDraft.name=n.value;
  const t=document.getElementById("pf-tier");if(t)personEditDraft.tier=t.value;
  const b=document.getElementById("pf-birthday");if(b)personEditDraft.birthday=b.value;
  const c=document.getElementById("pf-cadence");if(c){const v=+c.value;personEditDraft.cadenceDays=v>0?v:"";}
  const no=document.getElementById("pf-notes");if(no)personEditDraft.notes=no.value;
}
window.savePersonEdit=()=>{
  collectPersonEditForm();
  const d=personEditDraft;
  if(!d||!d.name||!d.name.trim()){alert("Name is required");return;}
  const isNew=!d.id;
  const id=d.id||genId("p");
  S.people[id]={
    id,
    name:d.name.trim(),
    tier:d.tier||undefined,
    birthday:d.birthday||undefined,
    cadenceDays:d.cadenceDays&&+d.cadenceDays>0?+d.cadenceDays:undefined,
    notes:d.notes?d.notes.trim()||undefined:undefined,
    created:isNew?dkf(today):(S.people[id]?.created||dkf(today))
  };
  // Strip undefined so they don't clutter the saved object
  Object.keys(S.people[id]).forEach(k=>{if(S.people[id][k]===undefined)delete S.people[id][k];});
  personEditDraft=null;
  selectedPersonId=id;
  peopleView="detail";
  sv();
};
window.deletePerson=pid=>{
  if(!S.people[pid])return;
  delete S.people[pid];
  // Remove this personId from every interaction; drop interactions that now have zero people
  Object.keys(S.interactions||{}).forEach(dk=>{
    S.interactions[dk]=(S.interactions[dk]||[]).map(iv=>({...iv,personIds:(iv.personIds||[]).filter(p=>p!==pid)})).filter(iv=>(iv.personIds||[]).length>0);
    if(S.interactions[dk].length===0)delete S.interactions[dk];
  });
  selectedPersonId=null;peopleView="list";
  sv();
};

// Log-interaction modal
window.openLogInteraction=()=>{logInteractionOpen=true;logInteractionSeed={date:dkf(today),personIds:[]};render();};
window.openLogInteractionFor=pid=>{logInteractionOpen=true;logInteractionSeed={date:dkf(today),personIds:[pid]};render();};
window.openLogInteractionFromDayEdit=dk=>{dayEdit=false;dayEditDate=null;logInteractionOpen=true;logInteractionSeed={date:dk,personIds:[]};render();};
window.closeLogInteraction=()=>{logInteractionOpen=false;logInteractionSeed=null;render();};
window.liToggleP=pid=>{
  // Pull current date/type/notes from DOM so they aren't lost on re-render
  if(!logInteractionSeed)logInteractionSeed={};
  const d=document.getElementById("li-date");if(d)logInteractionSeed.date=d.value||logInteractionSeed.date;
  const ty=document.getElementById("li-type");if(ty)logInteractionSeed.type=ty.value;
  const no=document.getElementById("li-notes");if(no)logInteractionSeed.notes=no.value;
  const set=new Set(logInteractionSeed.personIds||[]);
  if(set.has(pid))set.delete(pid);else set.add(pid);
  logInteractionSeed.personIds=[...set];
  render();
};
window.saveLogInteraction=()=>{
  const dk=document.getElementById("li-date")?.value||dkf(today);
  const type=document.getElementById("li-type")?.value||"other";
  const notes=document.getElementById("li-notes")?.value?.trim()||"";
  const personIds=logInteractionSeed?.personIds||[];
  if(personIds.length===0){alert("Pick at least one person");return;}
  const id=genId("ix");
  if(!S.interactions[dk])S.interactions[dk]=[];
  const entry={id,personIds:[...personIds],type};
  if(notes)entry.notes=notes;
  S.interactions[dk].push(entry);
  logInteractionOpen=false;logInteractionSeed=null;
  sv();
};
// Remove by date + interaction id — used by the calendar chip × and the person detail view
window.rmInteraction=(dk,iid)=>{
  if(!S.interactions[dk])return;
  S.interactions[dk]=S.interactions[dk].filter(iv=>iv.id!==iid);
  if(S.interactions[dk].length===0)delete S.interactions[dk];
  sv();
};
window.rmInteractionById=(dk,iid)=>window.rmInteraction(dk,iid);

render();
</script>
</body>
</html>
